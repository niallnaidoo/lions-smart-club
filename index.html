        justify-content: space-between;
      }
      .fac-vinis-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .fac-vinis-score {
        display: inline-flex;
        align-items: baseline;
        gap: 6px;
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums;
      }
      .fac-vinis-trend {
        font-size: 10.5px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.02em;
      }
      .fac-vinis-score.up .fac-vinis-trend {
        color: var(--green);
      }
      .fac-vinis-score.down .fac-vinis-trend {
        color: #C33;
      }
      .fac-vinis-word {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 700;
      }

      /* Selection strip — pinned to the bottom of the view like Groundskeeper */
      .fac-selection-strip {
        margin-top: 18px;
        padding: 12px 16px;
        background: var(--ink);
        color: #fff;
        border-radius: 14px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .fac-selection-count {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--gold-mid);
      }
      .fac-selection-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        flex: 1;
      }
      .fac-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px 5px 12px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 99px;
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 600;
      }
      .fac-chip button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border: 0;
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
        border-radius: 50%;
        cursor: pointer;
        padding: 0;
      }
      .fac-chip button svg {
        width: 8px;
        height: 8px;
      }
      .fac-chip button:hover {
        background: #fff;
        color: var(--ink);
      }
      .fac-selection-actions {
        display: flex;
        gap: 8px;
      }

      /* ─── Satellite layout ─── */
      .fac-sat-layout {
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 14px;
        margin-top: 14px;
      }
      .fac-sat-filters {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        align-self: flex-start;
        position: sticky;
        top: 14px;
      }
      .fac-filter-label {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
      }
      .fac-filter-value {
        color: var(--ink);
        text-transform: none;
        letter-spacing: 0;
        font-size: 11px;
      }
      .fac-filter-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .fac-filter-chip {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border: 1px solid var(--line);
        border-radius: 99px;
        background: var(--white);
        color: var(--ink);
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.14s ease,
          border-color 0.14s ease,
          color 0.14s ease;
      }
      .fac-filter-chip:hover:not(:disabled) {
        border-color: var(--ink3);
      }
      .fac-filter-chip.active {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }
      .fac-filter-chip:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .fac-range {
        width: 100%;
        accent-color: var(--green);
      }
      .fac-filter-hint {
        margin-top: 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
        line-height: 1.5;
      }
      .fac-filter-count {
        margin-top: auto;
        padding-top: 10px;
        border-top: 1px solid var(--line2);
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        font-weight: 600;
      }

      .fac-sat-main {
        display: flex;
        flex-direction: column;
        gap: 14px;
        position: relative;
      }
      .fac-map {
        width: 100%;
        height: 520px;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: #111;
      }

      /* Score-badge markers on the map */
      .fac-marker-dot {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 2px solid #fff;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      /* Detail card — floats over the map (right side) */
      .fac-detail {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 320px;
        background: var(--white);
        border-radius: 12px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        border: 1px solid var(--line);
        animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        overflow: hidden;
        z-index: 1000;
      }
      .fac-detail-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 16px 18px 12px;
        border-bottom: 1px solid var(--line2);
      }
      .fac-detail-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--green);
        margin-bottom: 4px;
      }
      .fac-detail-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .fac-detail-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 2px;
      }
      .fac-detail-close {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--paper);
        border: 0;
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .fac-detail-close svg {
        width: 10px;
        height: 10px;
      }
      .fac-detail-close:hover {
        background: var(--ink);
        color: #fff;
      }
      .fac-detail-body {
        padding: 16px 18px 18px;
      }
      .fac-detail-hero {
        text-align: center;
        padding: 6px 0 12px;
        border-bottom: 1px dashed var(--line2);
        margin-bottom: 14px;
      }
      .fac-detail-score {
        font-family: 'Montserrat', sans-serif;
        font-size: 44px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.03em;
        line-height: 1;
      }
      .fac-detail-score.up {
        color: var(--green);
      }
      .fac-detail-score.down {
        color: #C33;
      }
      .fac-detail-condition {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 4px;
      }
      .fac-detail-meta {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        color: var(--muted);
        margin-top: 6px;
      }
      .fac-detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px 14px;
      }
      .fac-detail-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-bottom: 4px;
      }
      .fac-detail-v {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
        font-variant-numeric: tabular-nums;
      }
      .fac-detail-v.up {
        color: var(--green);
      }
      .fac-detail-v.down {
        color: #C33;
      }

      /* Compare panel — Groundskeeper-parallel */
      .fac-compare {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px 22px;
        animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .fac-compare-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .fac-compare-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 20px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.02em;
      }
      .fac-compare-count {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 5px 10px;
        border: 1px solid var(--line);
        border-radius: 99px;
      }
      .fac-compare-grid {
        display: grid;
        gap: 12px;
      }
      .fac-compare-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
        position: relative;
      }
      .fac-compare-name {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
        margin-bottom: 10px;
      }
      .fac-compare-score {
        font-family: 'Montserrat', sans-serif;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
      }
      .fac-compare-score.up {
        color: var(--green);
      }
      .fac-compare-score.down {
        color: #C33;
      }
      .fac-compare-condition {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 4px;
      }
      .fac-compare-remove {
        margin-top: 12px;
        width: 100%;
        padding: 8px;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        cursor: pointer;
      }
      .fac-compare-remove:hover {
        border-color: var(--ink);
        color: var(--ink);
      }

      .fac-compare-section {
        margin-top: 20px;
        padding-top: 18px;
        border-top: 1px solid var(--line2);
      }
      .fac-compare-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 16px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .fac-city-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: var(--muted);
        margin-top: 3px;
      }

      /* Mobile: stack the satellite layout */
      @media (max-width: 900px) {
        .fac-sat-layout {
          grid-template-columns: 1fr;
        }
        .fac-sat-filters {
          position: static;
        }
        .fac-detail {
          position: static;
          width: 100%;
        }
        .fac-map {
          height: 340px;
        }
        .fac-vinis-cell {
          gap: 8px;
        }
      }

      /* ─── Ground drilldown (AdminFacilityDetail) ─── */
      .fac-back {
        background: none;
        border: 0;
        color: var(--muted);
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        padding: 0;
      }
      .fac-back:hover {
        color: var(--ink);
      }

      .fac-detail-layout {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 18px;
        align-items: flex-start;
      }
      .fac-detail-left {
        min-width: 0;
      }
      .fac-detail-right {
        position: sticky;
        top: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* Tab bar */
      .fac-tabs {
        display: flex;
        gap: 4px;
        padding: 4px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 12px;
        margin-bottom: 14px;
      }
      .fac-tab {
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 12px;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        font-weight: 700;
        letter-spacing: 0.01em;
        border-radius: 8px;
        cursor: pointer;
      }
      .fac-tab:hover {
        color: var(--ink);
      }
      .fac-tab.active {
        background: var(--white);
        color: var(--ink);
        box-shadow: 0 2px 8px rgba(10, 15, 20, 0.05);
      }
      .fac-tab-num {
        display: inline-flex;
        min-width: 22px;
        padding: 2px 6px;
        background: var(--paper2);
        color: var(--muted);
        font-size: 10.5px;
        font-weight: 800;
        border-radius: 99px;
        justify-content: center;
      }
      .fac-tab.active .fac-tab-num {
        background: var(--ink);
        color: #fff;
      }
      .fac-tab-num.warn {
        background: var(--coral-pale, #F5DBD7);
        color: var(--coral, #B44);
      }
      .fac-tab.active .fac-tab-num.warn {
        background: var(--coral, #B44);
        color: #fff;
      }

      .fac-tab-body {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      /* Objective banner — tells the admin why this screen exists */
      .fac-objective {
        background: var(--ink);
        color: #fff;
        border-radius: 12px;
        padding: 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .fac-objective-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--gold-mid);
      }
      .fac-objective-text {
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.85);
        line-height: 1.5;
      }
      .fac-objective-text strong {
        color: #fff;
      }

      /* Section head — row above every subsection */
      .fac-section-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 10px;
        margin-top: 6px;
      }
      .fac-section-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .fac-section-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 2px;
      }

      /* Job cards */
      .fac-jobs-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .fac-empty {
        background: var(--paper);
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 22px 16px;
        text-align: center;
        color: var(--muted);
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
      }
      .fac-job {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 18px;
      }
      .fac-job.done {
        background: var(--green-pale, rgba(31, 170, 92, 0.06));
        border-color: rgba(15, 77, 46, 0.15);
      }
      .fac-job-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }
      .fac-job-eyebrow {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 4px;
      }
      .fac-priority {
        font-family: 'Montserrat', sans-serif;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.16em;
        padding: 2px 7px;
        border-radius: 4px;
        background: var(--paper);
        color: var(--muted);
      }
      .fac-priority.high {
        background: rgba(180, 68, 68, 0.15);
        color: #A33;
      }
      .fac-priority.medium {
        background: rgba(183, 148, 32, 0.18);
        color: #7A6109;
      }
      .fac-priority.done {
        background: var(--green);
        color: #fff;
      }
      .fac-job-type {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .fac-job-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .fac-job-meta {
        display: flex;
        gap: 12px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
      }
      .fac-job-meta strong {
        color: var(--ink);
        font-weight: 700;
      }
      .fac-due-overdue {
        color: var(--coral, #B44) !important;
        font-weight: 700 !important;
      }
      .fac-job-actions {
        flex-shrink: 0;
      }
      .fac-job-btn {
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 12px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: var(--ink);
        cursor: pointer;
      }
      .fac-job-btn:hover {
        border-color: var(--ink);
      }
      .fac-job-btn.primary {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }
      .fac-job-btn.primary:hover {
        background: var(--ink);
      }

      /* Progress row */
      .fac-job-progress {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 12px;
      }
      .fac-job-progress-bar {
        flex: 1;
        height: 6px;
        background: var(--paper);
        border-radius: 99px;
        overflow: hidden;
      }
      .fac-job-progress-fill {
        height: 100%;
        background: var(--green);
        transition: width 0.3s ease;
      }
      .fac-job-progress-txt {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.06em;
      }

      /* Checklist */
      .fac-checklist {
        list-style: none;
        margin: 10px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .fac-checklist li {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        color: var(--ink);
      }
      .fac-checklist li.done > span {
        text-decoration: line-through;
        color: var(--muted-2);
      }
      .fac-checklist-box {
        width: 18px;
        height: 18px;
        border-radius: 5px;
        border: 1.5px solid var(--line);
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #fff;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .fac-checklist-box.on {
        background: var(--green);
        border-color: var(--green);
      }
      .fac-checklist-box svg {
        width: 12px;
        height: 12px;
      }

      /* Load & wear */
      .fac-load-kpis {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .fac-load-kpi {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .fac-load-kpi.tone-coral {
        border-color: rgba(180, 68, 68, 0.35);
        background: rgba(180, 68, 68, 0.04);
      }
      .fac-load-kpi.tone-gold {
        border-color: rgba(183, 148, 32, 0.35);
        background: rgba(183, 148, 32, 0.04);
      }
      .fac-load-kpi.tone-teal {
        border-color: rgba(31, 170, 92, 0.3);
        background: rgba(31, 170, 92, 0.04);
      }
      .fac-load-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-bottom: 6px;
      }
      .fac-load-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 26px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.03em;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .fac-load-of {
        font-size: 14px;
        color: var(--muted);
        font-weight: 500;
        margin-left: 4px;
      }
      .fac-load-meta {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
        margin-top: 6px;
      }
      .fac-load-note {
        background: var(--paper);
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 12px 14px;
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.55;
      }

      /* Scoring events */
      .fac-events {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px 18px;
      }
      .fac-event-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 4px;
      }
      .fac-event-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink);
      }
      .fac-event-v {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
        font-variant-numeric: tabular-nums;
      }
      .fac-event-pct {
        font-size: 10.5px;
        color: var(--muted);
        font-weight: 600;
        margin-left: 4px;
      }
      .fac-event-bar {
        height: 6px;
        background: var(--paper);
        border-radius: 99px;
        overflow: hidden;
      }
      .fac-event-bar-fill {
        height: 100%;
        transition: width 0.3s ease;
      }

      /* Team & ownership */
      .fac-own-card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px 18px;
      }
      .fac-own-badge {
        display: inline-block;
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--green);
        background: var(--green-pale);
        padding: 5px 10px;
        border-radius: 99px;
        margin-bottom: 8px;
      }
      .fac-own-owner {
        font-family: 'Montserrat', sans-serif;
        font-size: 16px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .fac-own-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 6px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
      }

      .fac-staff-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
      }
      .fac-staff-card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .fac-staff-card.head {
        border-color: rgba(15, 77, 46, 0.25);
        background: linear-gradient(180deg, var(--white) 0%, var(--green-pale) 100%);
      }
      .fac-staff-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--ink);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 800;
        flex-shrink: 0;
      }
      .fac-staff-card.head .fac-staff-avatar {
        background: var(--green);
      }
      .fac-staff-name {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
      }
      .fac-staff-role {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
        margin-top: 1px;
      }
      .fac-staff-contact {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        color: var(--ink);
        margin-top: 3px;
        font-variant-numeric: tabular-nums;
      }

      .fac-teams-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      /* RIGHT sidebar — satellite thumbnail + snapshot */
      .fac-thumb-wrap {
        position: relative;
      }
      .fac-thumb {
        width: 100%;
        height: 220px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: #111;
      }
      .fac-thumb-fullscreen {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background: rgba(10, 15, 20, 0.85);
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 6px 12px;
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.06em;
        cursor: pointer;
      }
      .fac-thumb-fullscreen:hover {
        background: var(--ink);
      }

      .fac-side-card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px 18px;
      }
      .fac-side-card.compact {
        padding: 12px 16px;
      }
      .fac-side-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-bottom: 6px;
      }
      .fac-side-score {
        font-family: 'Montserrat', sans-serif;
        font-size: 40px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.03em;
        line-height: 1;
      }
      .fac-side-score.up {
        color: var(--green);
      }
      .fac-side-score.down {
        color: #C33;
      }
      .fac-side-condition {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 4px;
      }
      .fac-side-obs {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
      }
      .fac-side-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px 14px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px dashed var(--line2);
      }
      .fac-side-load-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: var(--muted);
      }
      .fac-side-load-row + .fac-side-load-row {
        border-top: 1px solid var(--line2);
      }
      .fac-side-load-n {
        font-weight: 800;
        color: var(--ink);
        font-size: 14px;
      }
      .fac-side-load-n.tone-teal {
        color: var(--green);
      }
      .fac-side-load-n.tone-gold {
        color: #B79420;
      }
      .fac-side-load-n.tone-coral {
        color: #B44;
      }
      .fac-side-load-warn {
        color: #B44;
        font-weight: 800;
      }

      /* Job-card create modal */
      .fac-jobmodal-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--line2);
        margin-bottom: 14px;
      }
      .fac-jobmodal-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
        margin-top: 2px;
      }
      .fac-jobmodal-body {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .fac-jobmodal-row {
        display: flex;
        flex-direction: column;
      }
      .fac-jobmodal-checklist {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 14px;
      }
      .fac-jobmodal-preset {
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px dashed var(--line2);
      }
      .fac-jobmodal-preset-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-bottom: 6px;
      }
      .fac-jobmodal-item {
        display: flex;
        gap: 8px;
        align-items: center;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        color: var(--ink);
        padding: 3px 0;
      }
      .fac-jobmodal-item.preset {
        color: var(--muted);
      }
      .fac-jobmodal-tick {
        color: var(--green);
        font-weight: 800;
      }
      .fac-jobmodal-remove {
        border: 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        padding: 4px;
      }
      .fac-jobmodal-remove svg {
        width: 10px;
        height: 10px;
      }
      .fac-jobmodal-add {
        margin-top: 8px;
        background: transparent;
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 7px 12px;
        width: 100%;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 700;
        color: var(--muted);
        cursor: pointer;
      }
      .fac-jobmodal-add:hover {
        color: var(--ink);
        border-color: var(--ink);
      }

      /* ─── Assets tab · pitch / covers / nets sections ─── */
      .fac-asset {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px 18px;
      }
      .fac-asset + .fac-asset {
        margin-top: 10px;
      }
      .fac-asset-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 12px;
      }
      .fac-asset-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .fac-asset-body {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .fac-asset-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px 16px;
      }
      .fac-asset-cta {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px dashed var(--line2);
        display: flex;
        justify-content: flex-end;
      }
      .fac-asset-empty {
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        color: var(--muted);
        line-height: 1.55;
        padding: 8px 0;
      }

      /* Small CQI provenance chip on every asset section */
      .fac-cqi-ref {
        display: inline-block;
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-top: 4px;
      }

      /* Star row for /5 condition scores */
      .fac-stars {
        display: inline-flex;
        align-items: center;
        gap: 2px;
      }
      .fac-star {
        color: var(--paper2, #E2E5E8);
        font-size: 14px;
        line-height: 1;
      }
      .fac-star.on {
        color: var(--gold, #C8A84B);
      }
      .fac-star.half {
        background: linear-gradient(90deg, var(--gold, #C8A84B) 50%, var(--paper2, #E2E5E8) 50%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .fac-star-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 800;
        color: var(--ink);
        margin-left: 6px;
      }

      /* Issues stack */
      .fac-issues {
        margin-top: 6px;
        padding: 10px 12px;
        background: var(--paper);
        border-radius: 8px;
        border-left: 3px solid var(--gold, #C8A84B);
      }
      .fac-issues-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .fac-issue {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: var(--ink);
        padding: 3px 0;
      }

      /* Support kit grid */
      .fac-support-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .fac-support-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 10px;
      }
      .fac-support-item.off {
        background: rgba(180, 68, 68, 0.04);
        border-color: rgba(180, 68, 68, 0.2);
      }
      .fac-support-icon {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 800;
      }
      .fac-support-item.on .fac-support-icon {
        background: var(--green-pale);
        color: var(--green);
      }
      .fac-support-item.off .fac-support-icon {
        background: rgba(180, 68, 68, 0.12);
        color: #B44;
      }
      .fac-support-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
      }

      /* ─── Investment plan tab ─── */
      .fac-capex-group,
      .fac-maint-group {
        margin-top: 8px;
      }
      .fac-capex-group-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--green);
        margin-bottom: 8px;
      }
      .fac-capex-card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 18px;
      }
      .fac-capex-card + .fac-capex-card {
        margin-top: 8px;
      }
      .fac-capex-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
      }
      .fac-capex-eyebrow {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        margin-bottom: 6px;
      }
      .fac-capex-target {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.08em;
      }
      .fac-capex-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .fac-capex-cost {
        font-family: 'Montserrat', sans-serif;
        font-size: 20px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.03em;
        font-variant-numeric: tabular-nums;
      }
      .fac-capex-justify {
        margin-top: 8px;
        padding: 10px 12px;
        background: var(--paper);
        border-radius: 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        color: var(--muted);
        line-height: 1.55;
      }
      .fac-capex-foot {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed var(--line2);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
      }
      .fac-capex-foot strong {
        color: var(--ink);
        font-weight: 700;
      }

      /* Maintenance plan table */
      .fac-maint-group-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
      }
      .fac-maint-total {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 800;
        color: var(--green);
        font-variant-numeric: tabular-nums;
      }
      .fac-maint-total span {
        font-size: 11px;
        color: var(--muted);
        font-weight: 600;
        margin-left: 2px;
      }
      .fac-maint-table {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
      }
      .fac-maint-row {
        display: grid;
        grid-template-columns: 100px 1fr auto auto;
        gap: 14px;
        align-items: center;
        padding: 11px 14px;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        color: var(--ink);
      }
      .fac-maint-row + .fac-maint-row {
        border-top: 1px solid var(--line2);
      }
      .fac-maint-task {
        font-weight: 700;
      }
      .fac-maint-meta {
        display: flex;
        flex-direction: column;
        gap: 2px;
        font-size: 11px;
        color: var(--muted);
      }
      .fac-maint-cost {
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }

      @media (max-width: 700px) {
        .fac-asset-grid {
          grid-template-columns: 1fr 1fr;
        }
        .fac-maint-row {
          grid-template-columns: 1fr;
          gap: 4px;
        }
      }

      /* ─── Job card modal — bigger, prefilled section is unmissable ─── */
      .jobmodal-box {
        max-width: 780px !important;
        width: 100%;
        text-align: left;
        padding: 0 !important;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .jobmodal-box > .fac-jobmodal-head {
        padding: 22px 26px 16px;
        margin-bottom: 0 !important;
      }
      .jobmodal-box > .fac-jobmodal-body {
        padding: 0 26px 22px;
        overflow-y: auto;
        flex: 1;
      }

      .jobmodal-step {
        padding-top: 16px;
      }
      .jobmodal-step + .jobmodal-step {
        border-top: 1px solid var(--line2);
        margin-top: 16px;
      }
      .jobmodal-step-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--green);
        margin-bottom: 10px;
      }

      /* Job-type picker grid (replaces the dropdown) */
      .jobmodal-type-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 8px;
      }
      .jobmodal-type {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 12px 14px;
        border: 1.5px solid var(--line);
        border-radius: 10px;
        background: var(--white);
        cursor: pointer;
        text-align: left;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .jobmodal-type:hover {
        border-color: var(--ink3);
      }
      .jobmodal-type.on {
        border-color: var(--green);
        background: var(--green-pale);
      }
      .jobmodal-type-icon {
        font-family: 'Montserrat', sans-serif;
        font-size: 16px;
        font-weight: 800;
        color: var(--muted);
      }
      .jobmodal-type.on .jobmodal-type-icon {
        color: var(--green);
      }
      .jobmodal-type-label {
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        font-weight: 700;
        color: var(--ink);
        line-height: 1.3;
      }
      .jobmodal-type-badge {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .jobmodal-type.on .jobmodal-type-badge {
        color: var(--green);
      }

      /* Prefilled checklist panel — hero of the modal */
      .jobmodal-prefill {
        margin-top: 16px;
        background: linear-gradient(180deg, var(--green-pale) 0%, rgba(255, 255, 255, 0.6) 100%);
        border: 1.5px solid rgba(15, 77, 46, 0.25);
        border-radius: 14px;
        padding: 18px 20px;
      }
      .jobmodal-prefill-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--green);
        margin-bottom: 6px;
      }
      .jobmodal-prefill-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .jobmodal-prefill-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 3px;
      }
      .jobmodal-prefill-list {
        list-style: none;
        margin: 12px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .jobmodal-prefill-list li {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        color: var(--ink);
        padding: 8px 10px;
        background: var(--white);
        border-radius: 8px;
        border: 1px solid rgba(15, 77, 46, 0.14);
      }
      .jobmodal-prefill-list li.off {
        opacity: 0.55;
      }
      .jobmodal-prefill-list li.off > span {
        text-decoration: line-through;
      }
      .jobmodal-prefill-box {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        border: 1.5px solid var(--green);
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--green);
        cursor: pointer;
        flex-shrink: 0;
      }
      .jobmodal-prefill-box.on {
        background: var(--green);
      }
      .jobmodal-prefill-box.on svg {
        color: #fff;
      }
      .jobmodal-prefill-box svg {
        width: 12px;
        height: 12px;
      }

      .jobmodal-title-hint {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 600;
        color: var(--green);
        text-transform: none;
        letter-spacing: 0.06em;
        margin-left: 4px;
      }

      .jobmodal-footer {
        border-top: 1px solid var(--line2);
        padding: 14px 26px;
        background: var(--paper);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .jobmodal-footer-summary {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: var(--muted);
      }
      .jobmodal-footer-summary strong {
        color: var(--ink);
        font-weight: 800;
      }
      .jobmodal-footer-actions {
        display: flex;
        gap: 10px;
      }

      /* ─── Discard button — used on custom assets + capex cards ─── */
      .fac-discard-btn {
        background: transparent;
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 8px 12px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 700;
        color: var(--muted);
        cursor: pointer;
        transition:
          color 0.14s ease,
          border-color 0.14s ease,
          background 0.14s ease;
      }
      .fac-discard-btn:hover {
        color: #C33;
        border-color: #C33;
        background: rgba(200, 51, 51, 0.06);
      }

      /* Template editor UI in the job card modal */
      .jobmodal-tmpl-btn {
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 12px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 700;
        color: var(--ink);
        cursor: pointer;
        white-space: nowrap;
      }
      .jobmodal-tmpl-btn:hover {
        background: var(--paper);
      }
      .jobmodal-tmpl-btn.primary {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }
      .jobmodal-tmpl-btn.primary:hover {
        background: var(--ink);
      }
      .jobmodal-prefill-list.edit {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 12px;
      }
      .jobmodal-tmpl-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 10px;
        background: var(--white);
        border: 1px solid rgba(15, 77, 46, 0.14);
        border-radius: 8px;
      }
      .jobmodal-tmpl-num {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--green);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 800;
        flex-shrink: 0;
      }
      .jobmodal-tmpl-row .field-input {
        flex: 1;
        height: 36px;
      }
      .jobmodal-tmpl-remove {
        background: transparent;
        border: 0;
        color: var(--muted);
        cursor: pointer;
        padding: 6px;
      }
      .jobmodal-tmpl-remove:hover {
        color: #C33;
      }
      .jobmodal-tmpl-remove svg {
        width: 12px;
        height: 12px;
      }
      .jobmodal-tmpl-add {
        margin-top: 6px;
        background: transparent;
        border: 1px dashed rgba(15, 77, 46, 0.35);
        border-radius: 8px;
        padding: 8px 14px;
        width: 100%;
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: var(--green);
        cursor: pointer;
      }
      .jobmodal-tmpl-add:hover {
        border-style: solid;
        background: rgba(15, 77, 46, 0.05);
      }

      /* ─── Club-side facilities view ─── */
      .cf-manage-row {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 20px;
      }
      .cf-manage-toggle {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .cf-manage-btn {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        background: var(--white);
        border: 1.5px solid var(--line);
        border-radius: 12px;
        cursor: pointer;
        text-align: left;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .cf-manage-btn:hover {
        border-color: var(--ink3);
      }
      .cf-manage-btn.on {
        border-color: var(--green);
        background: var(--green-pale);
      }
      .cf-manage-icon {
        font-size: 22px;
        line-height: 1;
        margin-top: 2px;
      }
      .cf-manage-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .cf-manage-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 3px;
      }
      .cf-owner-field {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      @media (max-width: 900px) {
        .cf-manage-row {
          grid-template-columns: 1fr;
        }
      }

      /* Empty state used across the club view */
      .cf-empty {
        padding: 22px;
        background: var(--paper);
        border: 1px dashed var(--line);
        border-radius: 10px;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        color: var(--muted);
        text-align: center;
        line-height: 1.55;
      }
      .cf-empty strong {
        color: var(--ink);
      }

      /* Staff grid */
      .cf-staff-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 10px;
      }
      .cf-staff-card {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        position: relative;
      }
      .cf-staff-info {
        flex: 1;
        min-width: 0;
      }
      .cf-staff-remove {
        background: transparent;
        border: 0;
        color: var(--muted);
        cursor: pointer;
        padding: 4px;
      }
      .cf-staff-remove:hover {
        color: #C33;
      }
      .cf-staff-remove svg {
        width: 12px;
        height: 12px;
      }

      /* Asset summary tiles */
      .cf-summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 8px;
        margin-top: 14px;
      }
      .cf-summary-tile {
        padding: 12px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 10px;
        text-align: center;
      }
      .cf-summary-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-bottom: 6px;
      }
      .cf-summary-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 24px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.02em;
        line-height: 1;
      }

      .cf-custom-assets {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 8px;
      }
      .cf-custom-asset {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 14px;
      }
      .cf-custom-asset-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .cf-custom-asset-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
      }
      .cf-custom-asset-meta {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }

      /* Reports list */
      .cf-reports-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .cf-report-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }
      .cf-report-date {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
      }

      /* ─── Structured issue logger inside the AssessmentEditor ─── */
      .assess-issues-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 10px;
      }
      .assess-issues-subhead {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 3px;
      }
      .assess-log-btn {
        background: var(--ink);
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 8px 14px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 800;
        letter-spacing: 0.02em;
        cursor: pointer;
        white-space: nowrap;
      }
      .assess-log-btn:hover {
        background: var(--green);
      }

      /* Quick-tag category chip grid */
      .assess-cat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 6px;
      }
      .assess-cat-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 10px;
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 700;
        color: var(--ink);
        text-align: left;
        transition:
          border-color 0.15s ease,
          background 0.15s ease,
          transform 0.15s ease;
      }
      .assess-cat-chip:hover {
        border-color: var(--ink3);
        transform: translateY(-1px);
      }
      .assess-cat-chip.on {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }
      .assess-cat-chip-icon {
        font-size: 15px;
        line-height: 1;
      }

      /* Inline logger form */
      .assess-logger {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .assess-logger-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 12px;
      }

      /* Severity chip row */
      .assess-sev-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .assess-sev-chip {
        background: var(--white);
        border: 1.5px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        text-align: left;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .assess-sev-chip:hover {
        border-color: var(--ink3);
      }
      .assess-sev-label {
        display: block;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
        margin-bottom: 3px;
      }
      .assess-sev-desc {
        display: block;
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
        line-height: 1.4;
      }
      .assess-sev-chip.on.tone-coral {
        border-color: #C33;
        background: rgba(200, 51, 51, 0.08);
      }
      .assess-sev-chip.on.tone-gold {
        border-color: #B79420;
        background: rgba(183, 148, 32, 0.08);
      }
      .assess-sev-chip.on.tone-muted {
        border-color: var(--muted);
        background: var(--paper);
      }
      .assess-sev-chip.on.tone-coral .assess-sev-label {
        color: #C33;
      }
      .assess-sev-chip.on.tone-gold .assess-sev-label {
        color: #B79420;
      }

      /* Logged issue cards */
      .assess-issue-list {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .assess-issue-card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 14px;
        border-left: 4px solid var(--muted);
      }
      .assess-issue-card.tone-coral {
        border-left-color: #C33;
        background: rgba(200, 51, 51, 0.03);
      }
      .assess-issue-card.tone-gold {
        border-left-color: #B79420;
        background: rgba(183, 148, 32, 0.03);
      }
      .assess-issue-card.tone-muted {
        border-left-color: var(--muted);
      }
      .assess-issue-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .assess-issue-cat {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .assess-issue-cat-icon {
        font-size: 20px;
        line-height: 1;
      }
      .assess-issue-cat-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .assess-issue-loc {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
        margin-top: 1px;
      }
      .assess-issue-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .assess-issue-sev {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 4px 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 800;
        background: var(--white);
        cursor: pointer;
      }
      .assess-issue-sev.tone-coral {
        color: #C33;
        border-color: rgba(200, 51, 51, 0.4);
      }
      .assess-issue-sev.tone-gold {
        color: #B79420;
        border-color: rgba(183, 148, 32, 0.4);
      }
      .assess-issue-sev.tone-muted {
        color: var(--muted);
      }
      .assess-issue-notes {
        margin-top: 8px;
        width: 100%;
        background: transparent;
        border: 0;
        border-bottom: 1px dashed var(--line2);
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: var(--muted);
        padding: 4px 0;
      }
      .assess-issue-notes:focus {
        outline: none;
        border-bottom-color: var(--green);
        color: var(--ink);
      }

      /* Asset cards: styled by severity when issues render on the Asset assessment tab */
      .fac-issue.tone-coral {
        color: #C33;
        border-left: 2px solid #C33;
        padding-left: 8px;
      }
      .fac-issue.tone-gold {
        color: #B79420;
      }
      .fac-issue-loc,
      .fac-issue-notes {
        color: var(--muted);
        font-weight: 500;
      }
      .fac-issue-reported {
        color: var(--green);
        font-weight: 700;
        font-size: 10.5px;
      }

      /* ─── Assessment mini-dashboard ─── */
      .fac-assess-dash {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 12px;
        animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .fac-assess-tile {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 16px;
      }
      .fac-assess-tile.coral {
        border-color: rgba(180, 68, 68, 0.35);
        background: rgba(180, 68, 68, 0.04);
      }
      .fac-assess-tile.gold {
        border-color: rgba(183, 148, 32, 0.35);
        background: rgba(183, 148, 32, 0.04);
      }
      .fac-assess-tile.teal {
        border-color: rgba(31, 170, 92, 0.28);
        background: rgba(31, 170, 92, 0.04);
      }
      .fac-assess-tile-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-bottom: 5px;
      }
      .fac-assess-tile-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 26px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.03em;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .fac-assess-tile-n span {
        font-size: 14px;
        color: var(--muted);
        margin-left: 3px;
        font-weight: 500;
      }
      .fac-assess-tile-meta {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
        margin-top: 6px;
      }
      .fac-assess-tile.coral .fac-assess-tile-n {
        color: #B44;
      }
      .fac-assess-tile.gold .fac-assess-tile-n {
        color: #B79420;
      }
      .fac-assess-tile.teal .fac-assess-tile-n {
        color: var(--green);
      }
      .fac-assess-tile-bar {
        margin-top: 8px;
        height: 6px;
        background: var(--paper);
        border-radius: 99px;
        overflow: hidden;
      }
      .fac-assess-tile-bar-fill {
        height: 100%;
        background: var(--green);
        transition: width 0.4s ease;
      }
      @media (max-width: 900px) {
        .fac-assess-dash {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* Vendor category grid (5-column checkbox picker) */
      .vendor-services-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 6px;
        max-height: 260px;
        overflow-y: auto;
        padding: 12px;
        background: var(--paper);
        border-radius: 10px;
        border: 1px solid var(--line);
      }
      .vendor-service {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--ink);
      }
      .vendor-service:hover {
        border-color: var(--ink3);
      }
      .vendor-service.on {
        background: var(--green-pale);
        border-color: var(--green);
        color: var(--green);
      }
      .vendor-service input {
        accent-color: var(--green);
        cursor: pointer;
      }

      .vendor-detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px 20px;
      }
      @media (max-width: 640px) {
        .vendor-detail-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Vendor selection hint under the vendor dropdown */
      .jobmodal-vendor-hint {
        margin-top: 6px;
        padding: 8px 10px;
        background: var(--paper);
        border-radius: 8px;
        border-left: 3px solid var(--green);
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        font-weight: 600;
      }

      /* ─── Admin: vendor category filter row ─── */
      .vendor-cat-row {
        align-items: center;
        flex-wrap: wrap;
        gap: 6px !important;
      }
      .vendor-cat-label {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-right: 4px;
      }

      /* ─── Club vendors view · tabs, catalog, cards ─── */
      .cv-tabs {
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        background: var(--paper);
        border-radius: 12px;
        border: 1px solid var(--line);
        margin-top: 12px;
      }
      .cv-tab {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: transparent;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.02em;
      }
      .cv-tab.on {
        background: var(--ink);
        color: var(--white);
      }
      .cv-tab-n {
        display: inline-block;
        padding: 1px 8px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        font-size: 10.5px;
        font-weight: 800;
      }
      .cv-tab:not(.on) .cv-tab-n {
        background: var(--line);
        color: var(--ink);
      }

      .cv-catalog {
        margin-top: 18px;
        display: grid;
        gap: 22px;
      }
      .cv-group {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px 18px 18px;
      }
      .cv-group-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .cv-group-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink);
      }
      .cv-group-count {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
      }
      .cv-group-grid,
      .cv-single-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
      }
      .cv-single-grid {
        margin-top: 18px;
      }
      .cv-empty {
        grid-column: 1 / -1;
        padding: 28px;
        text-align: center;
        background: var(--white);
        border: 1px dashed var(--line);
        border-radius: 12px;
        color: var(--muted);
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
      }

      .cv-card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        transition: border-color 0.15s;
      }
      .cv-card:hover {
        border-color: var(--ink3);
      }
      .cv-card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }
      .cv-card-name {
        font-family: 'Montserrat', sans-serif;
        font-size: 13.5px;
        font-weight: 800;
        color: var(--ink);
        line-height: 1.25;
      }
      .cv-card-cat {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: 3px;
      }
      .cv-card-rating {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 800;
        color: var(--green);
        text-align: right;
      }
      .cv-card-jobs {
        font-size: 10px;
        color: var(--muted);
        font-weight: 600;
        margin-top: 1px;
      }
      .cv-card-contact {
        padding: 8px 10px;
        background: var(--paper);
        border-radius: 8px;
      }
      .cv-card-person {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: var(--ink);
      }
      .cv-card-phone {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
        margin-top: 2px;
      }
      .cv-card-services {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .cv-card-service {
        padding: 3px 8px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 6px;
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 600;
        color: var(--ink);
      }
      .cv-card-service.more {
        background: var(--ink);
        color: var(--white);
        border-color: var(--ink);
      }
      .cv-card-notes {
        padding: 8px 10px;
        background: var(--paper);
        border-radius: 8px;
        border-left: 3px solid var(--green);
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--ink);
        line-height: 1.4;
      }
      .cv-card-foot {
        display: flex;
        justify-content: flex-end;
      }
      .cv-card-remove {
        padding: 5px 12px;
        background: transparent;
        border: 1px solid var(--coral);
        border-radius: 6px;
        color: var(--coral);
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }
      .cv-card-remove:hover {
        background: var(--coral);
        color: var(--white);
      }

      /* ─── Admin · Club Reports Inbox ─── */
      .cri-wrap {
        margin-top: 16px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px 18px 18px;
        border-left: 4px solid var(--gold);
      }
      .cri-empty {
        margin-top: 16px;
        padding: 16px 18px;
        background: var(--paper);
        border: 1px dashed var(--line);
        border-radius: 12px;
      }
      .cri-empty-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .cri-empty-body {
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        color: var(--muted);
        margin-top: 6px;
        line-height: 1.45;
      }
      .cri-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .cri-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .cri-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        margin-top: 3px;
      }
      .cri-kpis {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .cri-kpi {
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--paper);
        border: 1px solid var(--line);
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        color: var(--muted);
      }
      .cri-kpi-danger {
        background: rgba(220, 74, 74, 0.1);
        border-color: rgba(220, 74, 74, 0.3);
        color: var(--coral);
      }
      .cri-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .cri-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
        padding: 12px 14px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 10px;
        border-left: 3px solid var(--muted);
      }
      .cri-row-high {
        border-left-color: var(--coral);
        background: rgba(220, 74, 74, 0.05);
      }
      .cri-row-medium {
        border-left-color: var(--gold);
      }
      .cri-row-low {
        border-left-color: var(--paper3);
      }
      .cri-row-l {
        flex: 1;
        min-width: 0;
      }
      .cri-row-club {
        display: flex;
        gap: 6px;
        align-items: baseline;
        margin-bottom: 4px;
      }
      .cri-row-club-name {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
      }
      .cri-row-chair {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 600;
        color: var(--green);
      }
      .cri-row-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
      }
      .cri-row-note {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 4px;
        font-style: italic;
        line-height: 1.4;
      }
      .cri-row-meta {
        display: flex;
        gap: 8px;
        margin-top: 6px;
        align-items: center;
      }
      .cri-pri {
        padding: 2px 8px;
        border-radius: 999px;
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .cri-pri-high {
        background: rgba(220, 74, 74, 0.15);
        color: var(--coral);
      }
      .cri-pri-medium {
        background: rgba(181, 133, 0, 0.15);
        color: #b58500;
      }
      .cri-pri-low {
        background: var(--paper2);
        color: var(--muted);
      }
      .cri-status {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        color: var(--muted);
      }
      .cri-age {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
      }
      .cri-row-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .cri-btn {
        padding: 6px 12px;
        border-radius: 8px;
        background: var(--white);
        border: 1px solid var(--line);
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 700;
        color: var(--ink);
      }
      .cri-btn:hover {
        border-color: var(--ink3);
      }
      .cri-btn-primary {
        background: var(--ink);
        color: var(--white);
        border-color: var(--ink);
      }
      .cri-btn-primary:hover {
        background: var(--ink2);
      }
      .cri-btn-ghost {
        background: transparent;
        color: var(--muted);
      }
      .cri-more {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        color: var(--muted);
        padding: 6px 4px;
        text-align: center;
        font-weight: 600;
      }

      /* ─── Player subs paid pill ─── */
      .subs-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 999px;
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.05em;
        transition: transform 0.08s;
      }
      .subs-pill.off {
        background: transparent;
        border: 1px dashed var(--paper3);
        color: var(--muted);
      }
      .subs-pill.off:hover {
        border-color: var(--green);
        color: var(--green);
      }
      .subs-pill.on {
        background: var(--green-pale);
        border: 1px solid rgba(15, 77, 46, 0.3);
        color: var(--green);
      }
      .subs-pill.on:hover {
        transform: translateY(-1px);
      }
      .subs-tick {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: var(--green);
        color: var(--white);
        font-size: 9px;
      }

      /* ─── Financials · direction flow strip (In / Out / Net) ─── */
      .fin-flow-strip {
        display: grid;
        grid-template-columns: 1.4fr 1fr 1fr;
        gap: 12px;
        margin-top: 16px;
      }
      @media (max-width: 900px) {
        .fin-flow-strip {
          grid-template-columns: 1fr;
        }
      }
      .fin-flow {
        border-radius: 14px;
        padding: 16px 18px;
        border: 1px solid var(--line);
        background: var(--white);
      }
      .fin-flow-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .fin-flow-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 30px;
        font-weight: 900;
        line-height: 1.05;
        color: var(--ink);
        margin-top: 6px;
        font-variant-numeric: tabular-nums;
      }
      .fin-flow-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin-top: 6px;
      }
      .fin-flow-net {
        background: var(--ink);
        border-color: var(--ink);
      }
      .fin-flow-net .fin-flow-l,
      .fin-flow-net .fin-flow-sub {
        color: rgba(255, 255, 255, 0.66);
      }
      .fin-flow-net .fin-flow-n {
        color: var(--white);
      }
      .fin-flow-net[data-pos='y'] .fin-flow-n {
        color: #7fd6a3;
      }
      .fin-flow-net[data-pos='n'] .fin-flow-n {
        color: #ff8888;
      }
      .fin-flow-in {
        background: linear-gradient(180deg, var(--green-pale), var(--white));
      }
      .fin-flow-in .fin-flow-n {
        color: var(--green);
      }
      .fin-flow-out {
        background: linear-gradient(180deg, rgba(220, 74, 74, 0.06), var(--white));
      }
      .fin-flow-out .fin-flow-n {
        color: var(--coral);
      }

      /* ─── Financials · Primary income streams panel ─── */
      .fin-streams {
        margin-top: 16px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px 18px;
      }
      .fin-streams-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .fin-streams-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink);
      }
      .fin-streams-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
      }
      .fin-streams-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      @media (max-width: 720px) {
        .fin-streams-grid {
          grid-template-columns: 1fr;
        }
      }
      .fin-stream {
        padding: 14px 14px 12px;
        border-radius: 10px;
        background: var(--paper);
        border: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .fin-stream-l {
        font-family: 'Montserrat', sans-serif;
