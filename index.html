        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .fin-stream-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 22px;
        font-weight: 900;
        color: var(--ink);
        font-variant-numeric: tabular-nums;
        line-height: 1.1;
      }
      .fin-stream-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 600;
        color: var(--muted);
      }
      .fin-stream-bar {
        margin-top: 6px;
        height: 4px;
        background: var(--paper2);
        border-radius: 999px;
        overflow: hidden;
      }
      .fin-stream-bar-fill {
        height: 100%;
        border-radius: 999px;
      }
      .fin-stream-subscriptions .fin-stream-n {
        color: var(--green);
      }
      .fin-stream-subscriptions .fin-stream-bar-fill {
        background: var(--green);
      }
      .fin-stream-sponsorships .fin-stream-n {
        color: #b58500;
      }
      .fin-stream-sponsorships .fin-stream-bar-fill {
        background: #b58500;
      }
      .fin-stream-donations .fin-stream-n {
        color: var(--coral);
      }
      .fin-stream-donations .fin-stream-bar-fill {
        background: var(--coral);
      }

      /* Per-group breakdown row */
      .fin-groups {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 8px;
        margin-top: 12px;
      }
      .fin-group {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .fin-group-in {
        border-left: 3px solid var(--green);
      }
      .fin-group-out {
        border-left: 3px solid var(--coral);
      }
      .fin-group-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .fin-group-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        margin-top: 3px;
        font-variant-numeric: tabular-nums;
      }

      /* Direction tag on ledger rows */
      .fin-dir-tag {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 4px;
        font-family: 'Montserrat', sans-serif;
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0.14em;
      }
      .fin-dir-in {
        background: var(--green-pale);
        color: var(--green);
      }
      .fin-dir-out {
        background: rgba(220, 74, 74, 0.12);
        color: var(--coral);
      }

      /* ─── Club financials view · legacy kpi strip (kept for compatibility) ─── */
      .fin-kpi-strip {
        display: grid;
        grid-template-columns: 1.4fr repeat(4, 1fr);
        gap: 12px;
        margin-top: 16px;
      }
      @media (max-width: 900px) {
        .fin-kpi-strip {
          grid-template-columns: repeat(2, 1fr);
        }
        .fin-kpi-total {
          grid-column: 1 / -1;
        }
      }
      .fin-kpi {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .fin-kpi-total {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--white);
      }
      .fin-kpi-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .fin-kpi-total .fin-kpi-l {
        color: rgba(255, 255, 255, 0.6);
      }
      .fin-kpi-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 22px;
        font-weight: 900;
        color: var(--ink);
        line-height: 1.1;
        margin-top: 4px;
      }
      .fin-kpi-total .fin-kpi-n {
        color: var(--white);
        font-size: 26px;
      }
      .fin-kpi-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 600;
        color: var(--muted);
        margin-top: 4px;
      }
      .fin-kpi-total .fin-kpi-sub {
        color: rgba(255, 255, 255, 0.7);
      }

      .fin-tbl tr:hover {
        background: rgba(0, 0, 0, 0.02);
      }

      .fin-paid-toggle {
        padding: 4px 10px;
        border-radius: 999px;
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        border: 1px solid transparent;
      }
      .fin-paid-toggle.paid {
        background: var(--green-pale);
        color: var(--green);
        border-color: rgba(15, 77, 46, 0.25);
      }
      .fin-paid-toggle.unpaid {
        background: rgba(220, 74, 74, 0.1);
        color: var(--coral);
        border-color: rgba(220, 74, 74, 0.25);
      }
      .fin-row-remove {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background: transparent;
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
      }
      .fin-row-remove:hover {
        border-color: var(--coral);
        color: var(--coral);
      }
      .fin-paid-check {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        font-weight: 700;
        color: var(--ink);
      }
      .fin-paid-check input {
        accent-color: var(--green);
        width: 16px;
        height: 16px;
        cursor: pointer;
      }

      /* Vendor badge on job cards + fixture engine */
      .fac-vendor-badge {
        display: inline-block;
        padding: 1px 6px;
        margin-right: 6px;
        background: var(--paper);
        border-radius: 4px;
        font-family: 'Montserrat', sans-serif;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--green);
        border: 1px solid rgba(15, 77, 46, 0.25);
      }

      /* ─── Asset assessment · top-of-tab selector + Add asset ─── */
      .fac-assets-toolbar {
        display: flex;
        gap: 14px;
        align-items: flex-end;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 16px;
        flex-wrap: wrap;
      }
      .fac-assets-picker {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        min-width: 260px;
      }
      .fac-assets-picker-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted-2);
      }
      .fac-assets-picker-warn {
        color: var(--coral, #B44);
        letter-spacing: 0.06em;
      }
      .fac-assets-picker-select {
        width: 100%;
        height: 42px;
      }

      /* ─── Asset section clickability + Assess button ─── */
      .fac-asset.clickable {
        cursor: pointer;
        transition:
          border-color 0.15s ease,
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }
      .fac-asset.clickable:hover {
        border-color: var(--ink3);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(10, 15, 20, 0.05);
      }
      .fac-asset-head-right {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .fac-asset-hint {
        display: inline-block;
        margin-left: 10px;
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--green);
        opacity: 0.75;
      }
      .fac-asset-assess-btn {
        background: var(--ink);
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 7px 12px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        cursor: pointer;
      }
      .fac-asset-assess-btn:hover {
        background: var(--green);
      }
      .fac-asset-assessed {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
        margin-top: 4px;
      }

      /* Assessment editor — condition slider hero */
      .assess-condition {
        background: var(--ink);
        color: #fff;
        border-radius: 12px;
        padding: 18px 20px;
      }
      .assess-condition-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--gold-mid);
      }
      .assess-condition-main {
        display: flex;
        align-items: baseline;
        gap: 14px;
        margin: 6px 0 10px;
      }
      .assess-condition-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 44px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.03em;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .assess-condition-n span {
        font-size: 20px;
        color: rgba(255, 255, 255, 0.55);
        margin-left: 4px;
      }
      .assess-condition-n.good {
        color: var(--green-bright, #6BC791);
      }
      .assess-condition-n.ok {
        color: #E0B850;
      }
      .assess-condition-n.bad {
        color: #E88A8A;
      }
      .assess-condition-word {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.75);
      }
      .assess-condition input[type='range'] {
        width: 100%;
        accent-color: var(--green-bright, #6BC791);
      }
      .assess-condition-scale {
        display: flex;
        justify-content: space-between;
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 4px;
      }

      .assess-section {
        display: flex;
        flex-direction: column;
      }
      .assess-issues {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .assess-issues-empty {
        padding: 12px;
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: var(--muted);
        background: var(--paper);
        border-radius: 8px;
        text-align: center;
      }
      .assess-issue {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        background: var(--paper);
        border-radius: 8px;
        border-left: 3px solid var(--gold, #C8A84B);
      }
      .assess-issue-icon {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 800;
        color: var(--gold, #C8A84B);
      }
      .assess-issue-text {
        flex: 1;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        color: var(--ink);
      }
      .assess-issue-remove {
        border: 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
      }
      .assess-issue-remove svg {
        width: 10px;
        height: 10px;
      }
      .assess-issue-add {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .assess-issue-add .field-input {
        flex: 1;
      }

      /* ─── Facility costing tab · cost tracker + breakdown ─── */
      .fac-cost-hero {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 6px;
      }
      .fac-cost-hero-main {
        background: var(--ink);
        color: #fff;
        border-radius: 14px;
        padding: 20px 24px;
      }
      .fac-cost-hero-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--gold-mid);
      }
      .fac-cost-hero-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 40px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.03em;
        line-height: 1;
        margin-top: 6px;
        font-variant-numeric: tabular-nums;
      }
      .fac-cost-hero-meta {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 4px;
      }
      .fac-cost-hero-variance {
        display: inline-block;
        margin-top: 12px;
        padding: 5px 12px;
        border-radius: 99px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .fac-cost-hero-variance.under {
        background: rgba(31, 170, 92, 0.2);
        color: var(--green-bright, #6BC791);
      }
      .fac-cost-hero-variance.over {
        background: rgba(200, 80, 80, 0.2);
        color: #F0A2A2;
      }
      .fac-cost-hero-side {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 18px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .fac-cost-side-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: var(--muted);
      }
      .fac-cost-side-row + .fac-cost-side-row {
        border-top: 1px solid var(--line2);
      }
      .fac-cost-side-row strong {
        color: var(--ink);
        font-weight: 800;
        font-size: 14px;
        font-variant-numeric: tabular-nums;
      }
      .fac-cost-side-row.primary strong {
        color: var(--green);
        font-size: 16px;
      }

      /* Per-asset spend breakdown */
      .fac-cost-breakdown {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .fac-cost-row {
        display: grid;
        grid-template-columns: 180px 1fr 180px;
        gap: 14px;
        align-items: center;
      }
      .fac-cost-row-name {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 800;
        color: var(--ink);
      }
      .fac-cost-row-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        color: var(--muted);
        margin-top: 2px;
      }
      .fac-cost-row-bar {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .fac-cost-row-track {
        flex: 1;
        height: 8px;
        background: var(--paper);
        border-radius: 99px;
        overflow: hidden;
      }
      .fac-cost-row-fill {
        height: 100%;
        background: var(--green);
        border-radius: 99px;
      }
      .fac-cost-row-pct {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 800;
        color: var(--muted);
        min-width: 34px;
        text-align: right;
      }
      .fac-cost-row-num {
        text-align: right;
      }
      .fac-cost-row-actual {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        font-variant-numeric: tabular-nums;
      }
      .fac-cost-row-var {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        margin-top: 2px;
      }
      .fac-cost-row-var.over {
        color: #C33;
      }
      .fac-cost-row-var.under {
        color: var(--green);
      }

      @media (max-width: 900px) {
        .fac-cost-hero {
          grid-template-columns: 1fr;
        }
        .fac-cost-row {
          grid-template-columns: 1fr;
          gap: 6px;
        }
      }

      /* Drilldown: collapse to one column on smaller screens */
      @media (max-width: 1120px) {
        .fac-detail-layout {
          grid-template-columns: 1fr;
        }
        .fac-detail-right {
          position: static;
          flex-direction: row;
          flex-wrap: wrap;
        }
        .fac-detail-right > * {
          flex: 1;
          min-width: 260px;
        }
        .fac-thumb-wrap {
          flex-basis: 100%;
        }
        .fac-load-kpis {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 640px) {
        .fac-tabs {
          flex-direction: column;
        }
        .fac-load-kpis {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
