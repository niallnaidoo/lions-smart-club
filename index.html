        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
      }
      .ps-card-icon svg {
        width: 28px;
        height: 28px;
      }
      .ps-card.gold .ps-card-icon {
        background: var(--gold);
        color: var(--ink);
      }
      .ps-card.teal .ps-card-icon {
        background: var(--teal);
        color: #fff;
      }

      .ps-card-role {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
        position: relative;
        z-index: 1;
      }
      .ps-card.gold .ps-card-role {
        color: var(--gold-mid);
      }
      .ps-card.teal .ps-card-role {
        color: var(--teal-mid);
      }

      .ps-card-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.01em;
        position: relative;
        z-index: 1;
      }
      .ps-card-desc {
        font-size: 13.5px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.6;
        position: relative;
        z-index: 1;
      }
      .ps-card-meta {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        position: relative;
        z-index: 1;
      }
      .ps-card-stat {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .ps-card-stat-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 20px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .ps-card-stat-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
      }
      .ps-card-cta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 6px;
        position: relative;
        z-index: 1;
      }
      .ps-card-cta-text {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #fff;
      }
      .ps-card-cta-arrow {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      .ps-card-cta-arrow svg {
        width: 14px;
        height: 14px;
      }
      .ps-card:hover .ps-card-cta-arrow {
        background: #fff;
        color: var(--ink);
      }

      .ps-footer {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 14px;
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.35);
      }
      .ps-footer .dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
      }

      .h-switch {
        height: 30px;
        padding: 0 12px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.12s;
        cursor: pointer;
      }
      .h-switch:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .h-switch svg {
        width: 11px;
        height: 11px;
      }

      /* ─── AFFILIATION SUBMITTED (view-only state) ─── */
      .aff-submitted-banner {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 22px;
        padding: 18px 22px;
        background: linear-gradient(90deg, var(--green-pale) 0%, rgba(232, 240, 235, 0.4) 100%);
        border: 1px solid var(--green);
        border-radius: 14px;
        animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .aff-submitted-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--green);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 6px 18px rgba(15, 77, 46, 0.25);
        animation: tickPop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        animation-delay: 0.15s;
      }
      .aff-submitted-icon svg {
        width: 22px;
        height: 22px;
      }
      @keyframes tickPop {
        from {
          transform: scale(0);
          opacity: 0;
        }
        50% {
          transform: scale(1.12);
          opacity: 1;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .aff-submitted-text {
        flex: 1;
        min-width: 0;
      }
      .aff-submitted-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--green);
        letter-spacing: -0.01em;
      }
      .aff-submitted-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: var(--green-mid);
        margin-top: 3px;
      }

      /* Disabled-form styling: greyed out fields but still readable */
      .aff-locked fieldset[disabled] {
        border: 0;
        padding: 0;
        margin: 0;
        min-width: 0;
        display: block;
      }
      .aff-locked fieldset[disabled] .field-input,
      .aff-locked fieldset[disabled] .field-select,
      .aff-locked fieldset[disabled] .field-textarea {
        background: var(--paper2);
        color: var(--ink3);
        cursor: not-allowed;
        border-color: var(--line2);
        opacity: 0.85;
      }
      .aff-locked fieldset[disabled] .seg {
        opacity: 0.7;
      }
      .aff-locked fieldset[disabled] .seg-btn {
        cursor: not-allowed;
      }
      .aff-locked fieldset[disabled] .check-item {
        cursor: not-allowed;
        opacity: 0.75;
      }
      .aff-locked fieldset[disabled] .trb-chip {
        cursor: not-allowed;
        opacity: 0.85;
      }
      .aff-locked fieldset[disabled] .num-slider-input {
        opacity: 0.6;
        cursor: not-allowed;
      }
      /* Hide "Drop pin" and "Add another" buttons in locked state */
      .aff-locked fieldset[disabled] button {
        cursor: not-allowed;
      }
      .aff-locked fieldset[disabled] .ground-map {
        pointer-events: auto;
        opacity: 1;
      } /* still browsable */

        color: rgba(255, 255, 255, 0.7);
      }
      .fix-table tbody tr {
        border-bottom: 1px solid var(--line2);
        transition: background 0.1s;
      }
      .fix-table tbody tr:last-child {
        border-bottom: none;
      }
      .fix-table tbody tr:hover {
        background: var(--paper);
      }
      .fix-table td {
        padding: 12px 14px;
        font-size: 12.5px;
        vertical-align: middle;
        color: var(--ink);
      }
      .fix-row-rd {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 700;
        background: var(--paper);
        color: var(--ink);
        padding: 3px 8px;
        border-radius: 6px;
        letter-spacing: 0.1em;
        display: inline-block;
      }
      .fix-row-date {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .fix-row-team {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .fix-row-team-name {
        font-weight: 700;
        font-size: 13px;
      }
      .fix-row-team-sub {
        font-size: 10.5px;
        color: var(--muted);
        font-weight: 500;
        margin-top: 1px;
      }
      .fix-row-venue {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .fix-row-venue-name {
        font-weight: 600;
        font-size: 12px;
        color: var(--ink);
      }
      .fix-row-venue-suburb {
        font-size: 10.5px;
        color: var(--muted);
        font-weight: 500;
      }
      .fix-row-dist {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 13px;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .fix-row-dist .unit {
        font-size: 9.5px;
        font-weight: 600;
        color: var(--muted);
        margin-left: 2px;
      }
      .fix-row-cost {
        font-family: 'Montserrat', sans-serif;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: -0.01em;
        color: var(--green);
      }
      .fix-row-cost .cur {
        font-size: 10px;
        font-weight: 700;
        color: var(--green-mid);
        margin-right: 2px;
      }
      .fix-totals {
        background: var(--paper);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 32px;
        border-top: 1px solid var(--line);
        flex-wrap: wrap;
      }
      .fix-totals-item {
        display: flex;
        flex-direction: column;
        gap: 2px;
        align-items: flex-end;
      }
      .fix-totals-l {
        font-size: 9.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 700;
        font-family: 'Montserrat', sans-serif;
      }
      .fix-totals-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 16px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.02em;
      }
      .fix-totals-n.green {
        color: var(--green);
      }

      /* Fixture status badges + action buttons */
      .fix-status {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 9px;
        border-radius: 99px;
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        border: 1px solid transparent;
      }
      .fix-status::before {
        content: '';
        width: 5px;
        height: 5px;
        border-radius: 50%;
      }
      .fix-status.scheduled {
        background: var(--paper2);
        color: var(--ink);
        border-color: var(--line);
      }
      .fix-status.scheduled::before {
        background: var(--ink3);
      }
      .fix-status.completed {
        background: var(--green-pale);
        color: var(--green);
      }
      .fix-status.completed::before {
        background: var(--green);
      }
      .fix-status.postponed {
        background: #f5efd8;
        color: #6e5618;
        border-color: rgba(110, 86, 24, 0.18);
      }
      .fix-status.postponed::before {
        background: #6e5618;
      }
      .fix-status.cancelled {
        background: #f5dbd7;
        color: #6b1f1a;
        border-color: rgba(107, 31, 26, 0.18);
      }
      .fix-status.cancelled::before {
        background: #6b1f1a;
      }

      .fix-row-actions {
        display: flex;
        gap: 4px;
        justify-content: flex-end;
        opacity: 0;
        transition: opacity 0.14s ease;
      }
      .fix-table tbody tr:hover .fix-row-actions {
        opacity: 1;
      }
      .fix-action-btn {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        transition: all 0.12s;
        cursor: pointer;
      }
      .fix-action-btn:hover {
        background: var(--paper2);
        color: var(--ink);
      }
      .fix-action-btn.danger:hover {
        background: rgba(107, 31, 26, 0.1);
        color: #6b1f1a;
      }
      .fix-action-btn svg {
        width: 13px;
        height: 13px;
      }

      /* Edit row */
      .fix-edit-tr {
        background: var(--paper) !important;
      }
      .fix-edit-tr td {
        padding: 14px 14px !important;
      }
      .fix-edit-grid {
        display: grid;
        grid-template-columns: 90px 1fr 1fr 1fr 110px auto;
        gap: 10px;
        align-items: end;
      }
      .fix-edit-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .fix-edit-field label {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .fix-edit-field input,
      .fix-edit-field select {
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 10px;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        font-weight: 500;
        background: var(--white);
        color: var(--ink);
      }
      .fix-edit-field input:focus,
      .fix-edit-field select:focus {
        border-color: var(--green);
        outline: none;
        box-shadow: 0 0 0 3px rgba(31, 170, 92, 0.18);
      }
      .fix-edit-actions {
        display: flex;
        gap: 6px;
        align-self: end;
      }

      .fix-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 14px 18px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        margin-bottom: 14px;
      }
      .fix-toolbar-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        flex-wrap: wrap;
      }
      .fix-toolbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .fix-toolbar .filter-pill {
        height: 30px;
      }

      /* Release bar — bottom-right CTA to publish fixtures to clubs */
      .fix-release-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 22px;
        margin-top: 14px;
        background: var(--ink);
        color: #fff;
        border-radius: var(--radius-lg);
        flex-wrap: wrap;
        box-shadow: 0 12px 36px rgba(10, 15, 20, 0.18);
        animation: fadeUp 0.42s cubic-bezier(0.16, 1, 0.3, 1) both;
        position: relative;
        overflow: hidden;
      }
      .fix-release-bar::before {
        content: '';
        position: absolute;
        top: -50px;
        right: -40px;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: rgba(75, 138, 108, 0.18);
        pointer-events: none;
      }
      .fix-release-bar.released {
        background: var(--green);
      }
      .fix-release-bar.released::before {
        background: rgba(255, 255, 255, 0.1);
      }
      .fix-release-text {
        position: relative;
        z-index: 1;
        flex: 1;
        min-width: 240px;
      }
      .fix-release-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gold-mid);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .fix-release-bar.released .fix-release-eyebrow {
        color: rgba(255, 255, 255, 0.7);
      }
      .fix-release-eyebrow::before {
        content: '';
        width: 14px;
        height: 1.5px;
        background: currentColor;
      }
      .fix-release-text-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 16px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.01em;
        line-height: 1.25;
      }
      .fix-release-text-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.65);
        margin-top: 5px;
        line-height: 1.5;
        max-width: 520px;
      }
      .fix-release-actions {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .fix-release-actions .btn-teal {
        background: var(--green-bright);
        color: var(--ink);
        padding: 13px 22px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }
      .fix-release-actions .btn-teal:hover {
        background: #fff;
        color: var(--ink);
      }
      .fix-release-bar.released .fix-release-actions .btn-outline {
        background: transparent;
        color: #fff;
        border-color: rgba(255, 255, 255, 0.3);
      }
      .fix-release-bar.released .fix-release-actions .btn-outline:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #fff;
      }

      /* RELEASED pill on series cards strip */
      .series-card-released {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 9px;
        border-radius: 99px;
        background: var(--green);
        color: #fff;
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .series-card-released::before {
        content: '';
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--green-bright);
        animation: pulseDot 2.2s ease-in-out infinite;
      }
      .series-card-draft {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 9px;
        border-radius: 99px;
        background: var(--paper2);
        color: var(--muted);
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      /* ─── Club-side Fixtures view ─── */
      .club-fix-empty {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 64px 40px;
        text-align: center;
        animation: fadeUp 0.42s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .club-fix-empty-icon {
        width: 84px;
        height: 84px;
        margin: 0 auto 22px;
        border-radius: 50%;
        background: var(--paper);
        border: 1.5px dashed var(--line);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
      }
      .club-fix-empty-icon svg {
        width: 36px;
        height: 36px;
      }
      .club-fix-empty-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 19px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
        margin-bottom: 10px;
      }
      .club-fix-empty-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.7;
        max-width: 520px;
        margin: 0 auto 18px;
      }
      .club-fix-empty-meta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted-2);
        background: var(--paper);
        padding: 7px 14px;
        border-radius: 99px;
      }
      .club-fix-empty-meta .sdot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--gold);
      }
      .club-fix-empty-meta strong {
        color: var(--ink);
        font-weight: 700;
        margin-left: 2px;
      }

      .club-fix-kpis {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 14px;
        animation: fadeUp 0.42s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .club-fix-kpi {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 16px 18px;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }
      .club-fix-kpi:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(10, 15, 20, 0.08);
      }
      .club-fix-kpi.green {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }
      .club-fix-kpi.green .club-fix-kpi-l {
        color: rgba(255, 255, 255, 0.6);
      }
      .club-fix-kpi.green .club-fix-kpi-n {
        color: var(--green-bright);
      }
      .club-fix-kpi.green .club-fix-kpi-meta {
        color: rgba(255, 255, 255, 0.55);
      }
      .club-fix-kpi-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-bottom: 8px;
      }
      .club-fix-kpi-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 32px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.03em;
        line-height: 1;
      }
      .club-fix-kpi-meta {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        color: var(--muted);
        margin-top: 8px;
        font-weight: 500;
      }

      .club-fix-next {
        background: linear-gradient(135deg, var(--green) 0%, var(--green-deep, #0f4d2e) 100%);
        border-radius: var(--radius-lg);
        padding: 20px 24px;
        color: #fff;
        margin: 14px 0;
        position: relative;
        overflow: hidden;
        animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .club-fix-next::before {
        content: '';
        position: absolute;
        right: -60px;
        top: -60px;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        pointer-events: none;
      }
      .club-fix-next-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.65);
        margin-bottom: 8px;
        position: relative;
        z-index: 1;
      }
      .club-fix-next-body {
        display: flex;
        align-items: center;
        gap: 22px;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
      }
      .club-fix-next-day {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 84px;
        height: 84px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        flex-shrink: 0;
      }
      .club-fix-next-day-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 30px;
        font-weight: 800;
        color: #fff;
        line-height: 1;
        letter-spacing: -0.03em;
      }
      .club-fix-next-day-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-top: 3px;
      }
      .club-fix-next-detail {
        flex: 1;
        min-width: 200px;
      }
      .club-fix-next-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        letter-spacing: -0.01em;
      }
      .club-fix-next-title strong {
        font-weight: 800;
      }
      .club-fix-next-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.7);
        margin-top: 4px;
      }
      .club-fix-next-tag {
        flex-shrink: 0;
      }

      .club-fix-series {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        margin-top: 14px;
        overflow: hidden;
        animation: fadeUp 0.42s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .club-fix-series-head {
        padding: 18px 22px;
        border-bottom: 1px solid var(--line2);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }
      .club-fix-series-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--green);
        margin-bottom: 4px;
      }
      .club-fix-series-name {
        font-family: 'Montserrat', sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .club-fix-series-meta {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 4px;
        font-weight: 500;
      }
      .club-fix-series-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .club-fix-series .tbl-w {
        border: none;
        border-radius: 0;
        background: transparent;
      }

      .club-fix-foot {
        margin-top: 18px;
        padding: 14px 18px;
        background: var(--paper);
        border-radius: 10px;
        border: 1px dashed var(--line);
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        line-height: 1.6;
        text-align: center;
      }

      @media (max-width: 980px) {
        .club-fix-kpis {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 560px) {
        .club-fix-kpis {
          grid-template-columns: 1fr;
        }
        .club-fix-next-body {
          gap: 14px;
        }
        .club-fix-next-day {
          width: 68px;
          height: 68px;
        }
        .club-fix-next-day-n {
          font-size: 24px;
        }
      }

      /* Confirmation popover — portaled to body so it perfectly centers regardless of parent transforms */
      .fix-confirm {
        position: fixed;
        inset: 0;
        background: rgba(10, 15, 20, 0.55);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: fadeIn 0.25s ease;
      }
      .fix-confirm-box {
        background: var(--white);
        border-radius: 18px;
        padding: 32px 30px 26px;
        max-width: 460px;
        width: 100%;
        text-align: center;
        box-shadow: 0 30px 80px rgba(10, 15, 20, 0.4);
        animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
      }
      .fix-confirm-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 18px;
      }
      .fix-confirm-icon.go {
        background: var(--green-pale);
        color: var(--green);
        box-shadow: 0 0 0 6px rgba(31, 170, 92, 0.1);
      }
      .fix-confirm-icon.danger {
        background: #f5dbd7;
        color: #6b1f1a;
        box-shadow: 0 0 0 6px rgba(107, 31, 26, 0.08);
      }
      .fix-confirm-icon svg {
        width: 30px;
        height: 30px;
      }
      .fix-confirm-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 20px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.015em;
        margin-bottom: 10px;
        line-height: 1.25;
      }
      .fix-confirm-body {
        font-family: 'Montserrat', sans-serif;
        font-size: 13.5px;
        color: var(--muted);
        line-height: 1.65;
        margin-bottom: 24px;
        max-width: 380px;
        margin-left: auto;
        margin-right: auto;
      }
      .fix-confirm-actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        padding-top: 18px;
        border-top: 1px solid var(--line2);
      }
      .fix-confirm-actions .btn {
        padding: 11px 22px;
        font-size: 13px;
        font-weight: 700;
      }
      .fix-confirm-actions .btn-teal {
        background: var(--green);
        color: #fff;
      }
      .fix-confirm-actions .btn-teal:hover {
        background: var(--ink);
      }

      /* Create-series form layout */
      .cs-form {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .cs-row {
        display: grid;
        grid-template-columns: 240px 1fr;
        align-items: center;
        gap: 18px;
        padding: 10px 0;
        border-bottom: 1px solid var(--line2);
      }
      .cs-row:last-child {
        border-bottom: none;
      }
      .cs-row-label {
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--ink);
      }
      .cs-row-label .req {
        color: var(--green-bright);
        font-weight: 700;
        margin-left: 2px;
      }
      .cs-row-input {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .cs-row-input .field-input,
      .cs-row-input .field-select {
        height: 38px;
        font-size: 13px;
      }
      .cs-row-input input[type='date'] {
        height: 38px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: inherit;
        font-size: 13px;
        background: var(--white);
        color: var(--ink);
      }
      .cs-row-multi {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        align-items: center;
      }
      .cs-row-multi-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .cs-row-multi-item label {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .cs-row-multi-item input {
        width: 72px;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 10px;
        font-size: 13px;
        font-weight: 600;
        font-family: 'Montserrat', sans-serif;
      }
      .cs-section {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }
      .cs-section-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--green);
        margin-bottom: 6px;
      }
      .cs-points-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 280px;
      }
      .cs-points-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border: 1.5px solid var(--green);
        border-radius: 8px;
        background: var(--white);
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 600;
        color: var(--ink);
        cursor: grab;
        transition:
          background 0.14s,
          transform 0.14s;
      }
      .cs-points-row:hover {
        background: var(--green-pale);
      }
      .cs-points-row .order-num {
        font-size: 10px;
        font-weight: 700;
        color: var(--green);
        background: var(--green-pale);
        padding: 2px 7px;
        border-radius: 6px;
        letter-spacing: 0.06em;
      }
      .cs-points-grip {
        margin-left: auto;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1;
      }
      .cs-teams-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 6px;
      }
      .cs-team-chip {
        padding: 7px 11px;
        border: 1.5px solid var(--line);
        border-radius: 99px;
        background: var(--white);
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--ink);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: all 0.14s;
        text-align: left;
      }
      .cs-team-chip:hover {
        border-color: var(--ink);
      }
      .cs-team-chip.on {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }
      .cs-team-chip svg {
        width: 11px;
        height: 11px;
      }

      @media (max-width: 768px) {
        .cs-row {
          grid-template-columns: 1fr;
          gap: 6px;
        }
        .fix-header {
          padding: 18px 20px;
        }
        .fix-header-aggs {
          width: 100%;
        }
        .fix-table {
          min-width: 760px;
        }
        .fix-table-wrap {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
      }

      /* ─── COHORT INSIGHTS PANEL (Admin → All Clubs) ─── */
      .insights-panel {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin-bottom: 22px;
      }
      .insights-card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 18px 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .insights-card:nth-child(1) {
        animation-delay: 0.05s;
      }
      .insights-card:nth-child(2) {
        animation-delay: 0.12s;
      }
      .insights-card:nth-child(3) {
        animation-delay: 0.19s;
      }
      .insights-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .insights-card-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink);
      }
      .insights-card-meta {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.04em;
      }
      .insights-bar-row {
        display: grid;
        grid-template-columns: 74px 1fr 38px;
        align-items: center;
        gap: 10px;
        padding: 5px 0;
      }
      .insights-bar-row.wide-label {
        grid-template-columns: 130px 1fr 44px;
      }
      .insights-bar-label {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .insights-bar-track {
        height: 9px;
        background: var(--paper2);
        border-radius: 99px;
        overflow: hidden;
      }
      .insights-bar-fill {
        height: 100%;
        background: var(--green);
        border-radius: 99px;
        transform-origin: left;
        animation: barGrow 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        animation-delay: 0.2s;
      }
      .insights-bar-fill.warn {
        background: #6e5618;
      }
      .insights-bar-fill.danger {
        background: #6b1f1a;
      }
      .insights-bar-fill.pending {
        background: var(--muted-3);
      }
      .insights-bar-num {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
        text-align: right;
        letter-spacing: -0.01em;
      }
      @keyframes barGrow {
        from {
          width: 0 !important;
        }
      }

      .insights-callout {
        margin-top: 12px;
        padding: 10px 12px;
        background: var(--paper2);
        border-radius: 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
        line-height: 1.55;
      }
      .insights-callout strong {
        color: var(--ink);
        font-weight: 700;
      }
      .insights-callout.alert {
        background: rgba(107, 31, 26, 0.06);
        color: #5a1815;
      }
      .insights-callout.alert strong {
        color: #6b1f1a;
      }
      .insights-callout.warn {
        background: #fbf5e0;
        color: #6e5618;
      }
      .insights-callout.warn strong {
        color: #5a4612;
      }
      .insights-callout.good {
        background: var(--green-pale);
        color: var(--green);
      }
      .insights-callout.good strong {
        color: var(--green);
      }

      .resource-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 2px;
      }
      .resource-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 12px;
        background: var(--paper2);
        border-radius: 10px;
        transition: background 0.15s ease;
      }
      .resource-row:hover {
        background: var(--paper3);
      }
      .resource-num {
        font-family: 'Montserrat', sans-serif;
        font-size: 24px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.03em;
        min-width: 34px;
        color: var(--ink);
      }
      .resource-num.warn {
        color: #6e5618;
      }
      .resource-num.danger {
        color: #6b1f1a;
      }
      .resource-num.good {
        color: var(--green);
      }
      .resource-text {
        font-size: 12px;
        color: var(--ink3);
        font-weight: 500;
        line-height: 1.4;
      }
      .resource-text strong {
        color: var(--ink);
        font-weight: 600;
      }

      @media (max-width: 1100px) {
        .insights-panel {
          grid-template-columns: repeat(2, 1fr);
        }
        .insights-panel .insights-card:last-child {
          grid-column: span 2;
        }
      }
      @media (max-width: 768px) {
        .insights-panel {
          grid-template-columns: 1fr;
        }
        .insights-panel .insights-card:last-child {
          grid-column: auto;
        }
      }

      /* ─── GROUND / VENUE LOCATOR ─── */
      .ground-section {
        margin-top: 6px;
      }
      .ground-section-head {
        margin-bottom: 14px;
      }
      .ground-section-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .ground-section-title svg {
        width: 16px;
        height: 16px;
        color: var(--green);
      }
      .ground-section-sub {
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 4px;
        line-height: 1.55;
        font-weight: 500;
      }

      .ground-map-card {
        margin-top: 16px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .ground-map-head {
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line2);
        background: var(--paper);
        flex-wrap: wrap;
      }
      .ground-status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .ground-status .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted-3);
      }
      .ground-status.confirmed {
        color: var(--green);
      }
      .ground-status.confirmed .dot {
        background: var(--green-bright);
        animation: pulseDot 2s ease-in-out infinite;
      }
      .ground-meta {
        flex: 1;
        min-width: 0;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--ink);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ground-map-frame {
        position: relative;
        background: var(--paper2);
      }
      .ground-map {
        width: 100%;
        height: 280px;
        display: block;
        z-index: 1;
      }
      .ground-map .leaflet-control-attribution {
        font-size: 9px;
        background: rgba(255, 255, 255, 0.85);
        font-family: 'Montserrat', sans-serif;
      }
      .ground-map .leaflet-control-zoom a {
        background: var(--white);
        color: var(--ink);
        border-color: var(--line);
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
      }
      .ground-map .leaflet-control-zoom a:hover {
        background: var(--paper);
        color: var(--green);
      }
      /* Custom green pulsing marker */
      .ground-marker {
        position: relative;
        width: 24px;
        height: 24px;
      }
      .ground-marker::before {
        content: '';
        position: absolute;
        left: 3px;
        top: 3px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--green);
        border: 3px solid #fff;
        box-shadow: 0 3px 10px rgba(14, 53, 41, 0.4);
        z-index: 2;
      }
      .ground-marker::after {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: rgba(31, 170, 92, 0.35);
        animation: pulseDot 2.2s ease-in-out infinite;
        z-index: 1;
      }
      .ground-map-loading {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(248, 249, 250, 0.8);
        backdrop-filter: blur(4px);
        pointer-events: none;
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--green);
      }
      .ground-map-loading .spinner {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid var(--green-pale);
        border-top-color: var(--green);
        margin-right: 8px;
        animation: spinSlow 0.8s linear infinite;
      }
      .ground-coords {
        position: absolute;
        left: 14px;
        bottom: 14px;
        z-index: 2;
        padding: 7px 12px;
        border-radius: 99px;
        background: rgba(10, 15, 20, 0.85);
        color: #fff;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        font-family: 'Montserrat', sans-serif;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        pointer-events: none;
      }
      .ground-coords svg {
        width: 13px;
        height: 13px;
        color: var(--green-bright);
      }

      /* ─── Affiliation payment block (Step 4) ─── */
      .aff-pay {
        background: var(--ink);
        color: #fff;
        border-radius: 12px;
        padding: 20px 22px;
        margin-bottom: 14px;
        display: flex;
        gap: 18px;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
      .aff-pay-icon {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        flex-shrink: 0;
        background: rgba(31, 170, 92, 0.18);
        color: var(--gold);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .aff-pay-text {
        flex: 1;
        min-width: 0;
      }
      .aff-pay-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--gold-mid);
      }
      .aff-pay-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 700;
        margin-top: 3px;
        color: #fff;
      }
      .aff-pay-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.55);
        margin-top: 3px;
        line-height: 1.45;
      }
      .aff-pay-amount {
        text-align: right;
        flex-shrink: 0;
      }
      .aff-pay-amount-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 32px;
        font-weight: 800;
        color: var(--gold-mid);
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .aff-pay-amount-vat {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.45);
        margin-top: 4px;
      }
      .aff-pay-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 8px;
      }

      @media (max-width: 640px) {
        .ground-map {
          height: 220px;
        }
        .ground-map-head {
          padding: 12px 14px;
          gap: 8px;
        }
        .ground-meta {
          text-align: left;
          width: 100%;
        }
      }

      /* ─── AFFILIATION TWO-COLUMN LAYOUT ─── */
      .aff-layout {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 28px;
        align-items: start;
      }
      .aff-main {
        min-width: 0;
      }
      .aff-side {
        position: sticky;
        top: 80px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .aff-hero-card {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        height: 380px;
        background-size: cover;
        background-position: center 25%;
        color: #fff;
        box-shadow: 0 18px 50px rgba(10, 15, 20, 0.25);
      }
      .aff-hero-card::after {
        content: '';
        position: absolute;
        inset: 0;
        z-index: 1;
        background: linear-gradient(
          180deg,
          rgba(10, 15, 20, 0.2) 0%,
          rgba(10, 15, 20, 0.4) 50%,
          rgba(10, 15, 20, 0.92) 100%
        );
      }
      .aff-hero-content {
        position: absolute;
        inset: 0;
        z-index: 2;
        padding: 22px 22px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .aff-hero-badge {
        align-self: flex-start;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 11px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(8px);
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #fff;
      }
      .aff-hero-badge .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 0 3px rgba(31, 170, 92, 0.25);
      }
      .aff-hero-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 24px;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.01em;
        color: #fff;
      }
      .aff-hero-title em {
        color: var(--gold-mid);
        font-style: normal;
        font-weight: 800;
      }
      .aff-hero-sub {
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.7);
        margin-top: 8px;
        line-height: 1.55;
      }
      .aff-hero-credit {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
        margin-top: 12px;
      }
      .aff-hero-credit strong {
        color: #fff;
        font-weight: 500;
      }

      .aff-summary {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px 18px;
      }
      .aff-summary-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .aff-summary-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink);
      }
      .aff-summary-step {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        color: var(--muted-2);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .aff-summary-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--line2);
      }
      .aff-summary-row:last-child {
        border-bottom: none;
      }
      .aff-summary-label {
        font-size: 11.5px;
        color: var(--muted);
        font-family: 'Montserrat', sans-serif;
        letter-spacing: 0.04em;
      }
      .aff-summary-value {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        text-align: right;
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .aff-summary-value.muted {
        color: var(--muted-2);
        font-weight: 500;
      }
      .aff-summary-foot {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--line2);
        font-size: 11px;
        color: var(--muted-2);
        font-family: 'Montserrat', sans-serif;
        letter-spacing: 0.06em;
        line-height: 1.5;
      }
      .aff-summary-foot strong {
        color: var(--teal-deep);
        font-weight: 600;
      }

      .aff-progress-pill {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 10px;
        background: linear-gradient(90deg, rgba(31, 170, 92, 0.06), transparent);
        border: 1px solid rgba(31, 170, 92, 0.18);
      }
      .aff-progress-num {
        font-family: 'Montserrat', sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: var(--teal-deep);
        line-height: 1;
        letter-spacing: -0.02em;
        min-width: 38px;
      }
      .aff-progress-info {
        flex: 1;
      }
      .aff-progress-label {
        font-size: 10.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted-2);
        font-family: 'Montserrat', sans-serif;
      }
      .aff-progress-sub {
        font-size: 12.5px;
        color: var(--ink3);
        margin-top: 1px;
      }

      /* responsive */
      /* ─── RESPONSIVE ─── */

      /* Tablet & smaller laptop (≤ 1100px): collapse two-column patterns */
      @media (max-width: 1100px) {
        .aff-layout {
          grid-template-columns: 1fr;
        }
        .aff-side {
          position: relative;
          top: 0;
        }
        .aff-hero-card {
          height: 280px;
        }
        .main {
          padding: 20px 24px 60px;
        }
      }

      /* Tablet (≤ 980px): horizontal nav, denser KPIs, stack right rails */
      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
        }
        .nav {
          position: relative;
          top: auto;
          height: auto;
          flex-direction: row;
          overflow-x: auto;
          padding: 10px;
          border-right: none;
          border-bottom: 1px solid var(--line);
        }
        .nav-section {
          display: none;
        }
        .nav-item {
          white-space: nowrap;
          padding: 8px 12px;
        }
        .nav-footer {
          display: none;
        }
        .kpi-strip {
          grid-template-columns: repeat(2, 1fr);
        }
        .score-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .phase-track {
          flex-direction: column;
        }
        .phase-step {
          border-right: none;
          border-bottom: 1px solid var(--line);
        }
        .phase-step:last-child {
          border-bottom: none;
        }
        .ps-cards {
          grid-template-columns: 1fr;
        }
        .ps-title {
          font-size: 32px;
          line-height: 1.1;
        }
        .ps-card {
          padding: 24px 22px;
        }
        .ps-brand-logo {
          height: 78px;
          padding: 12px 18px;
        }
        .hero-banner {
          height: 170px;
          padding: 20px 22px;
        }
        .hero-title {
          font-size: 22px;
        }
        /* admin dashboard 2-col splits (React serialises with a space after the colon) */
        .main [style*='1.4fr 1fr'] {
          display: flex !important;
          flex-direction: column;
          gap: 14px !important;
        }
        /* document help / club at-a-glance / outstanding-items 2-col splits */
        .main [style*='1fr 1fr']:not([style*='1.4fr']):not([style*='repeat']) {
          grid-template-columns: 1fr !important;
          display: grid;
        }
        .field-grid-4 {
          grid-template-columns: repeat(2, 1fr);
        }
        .field-grid-3 {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* Mobile (≤ 640px): single column everywhere, larger tap targets */
      @media (max-width: 640px) {
        html {
          font-size: 14px;
        }
        .app-header {
          padding: 0 14px;
          gap: 10px;
          height: 54px;
        }
        .h-logo-img {
          height: 34px;
          padding: 3px 6px;
        }
        .h-divider {
          display: none;
        }
        .h-sub {
          display: none;
        }
        .h-switch {
          padding: 0 9px;
          font-size: 9px;
          height: 28px;
        }
        .h-switch svg {
          display: none;
        }
        .h-bell {
          width: 30px;
          height: 30px;
        }
        .h-user {
          padding: 3px 8px 3px 3px;
        }
        .h-user-name {
          font-size: 10.5px;
        }
        .h-user-role {
          font-size: 8.5px;
        }
        .h-avatar {
          width: 24px;
          height: 24px;
          font-size: 9px;
        }
        .role-switch {
          padding: 2px;
          flex-shrink: 0;
        }
        .role-btn {
          padding: 4px 9px;
          font-size: 9px;
          letter-spacing: 0.06em;
          white-space: nowrap;
        }
        /* club selector becomes smaller */
        .app-header select {
          font-size: 10.5px !important;
          min-width: 120px !important;
          max-width: 140px !important;
        }

        .main {
          padding: 16px 14px 40px;
        }
        .main.fullbleed {
          padding: 0;
        }
        .nav {
          padding: 8px 10px;
        }
        .nav-item {
          padding: 7px 11px;
          font-size: 12px;
        }

        /* Page header stacks on mobile */
        .page-head {
          gap: 14px;
          margin-bottom: 18px;
        }
        .ph-title {
          font-size: 22px;
          line-height: 1.15;
        }
        .ph-desc {
          font-size: 12.5px;
        }
        .ph-actions {
          width: 100%;
          justify-content: flex-start;
        }
        .ph-actions .btn {
          flex: 1;
          justify-content: center;
        }

        /* KPI strip — single column on mobile */
        .kpi-strip {
          grid-template-columns: 1fr;
        }
        .kpi {
          padding: 14px 16px;
        }
        .kpi-n {
          font-size: 24px;
        }

        /* Score grid — single col */
        .score-grid {
          grid-template-columns: 1fr;
        }

        /* Hero banners — shorter, padded */
        .hero-banner {
          height: auto;
          min-height: 140px;
          padding: 16px 18px;
          border-radius: 12px;
        }
        .hero-title {
          font-size: 18px;
        }
        .hero-sub {
          font-size: 12px;
          max-width: none;
        }
        .hero-attrib {
          font-size: 8.5px;
          bottom: 8px;
          right: 10px;
        }

        /* Deadline strip wraps */
        .deadline {
          flex-wrap: wrap;
          padding: 12px 14px;
          gap: 10px;
        }
        .deadline-cta {
          width: 100%;
        }

        /* Cards & forms */
        .card-head {
          padding: 14px 16px;
          flex-wrap: wrap;
          gap: 8px;
        }
        .card-body {
          padding: 14px 16px;
        }
        .field-grid-2,
        .field-grid-3,
        .field-grid-4 {
          grid-template-columns: 1fr;
        }

        /* iOS Safari refuses to zoom-back when an input has font-size < 16px.
       Force 16px on all interactive inputs across the club portal so the page
       NEVER auto-zooms on field focus. Visual size stays tight via padding. */
        .field-input,
        .field-select,
        .field-textarea {
          font-size: 16px !important;
          height: 46px;
          padding: 0 14px;
          border-radius: 10px;
        }
        .field-textarea {
          height: auto;
          min-height: 96px;
          padding: 12px 14px;
          line-height: 1.5;
        }
        .field-select {
          padding-right: 38px;
        }
        .field-label {
          font-size: 11px;
        }
        /* Same fix for any raw <input>/<select> elsewhere (e.g. money inputs, search) */
        input[type='text'],
        input[type='email'],
        input[type='tel'],
        input[type='number'],
        input[type='search'],
        input[type='date'],
        input[type='url'],
        input[type='password'],
        select,
        textarea {
          font-size: 16px;
        }

        /* Tight payment block on mobile — stacks the amount under the title,
       smaller condensed type, narrower padding, cleaner CTA row */
        .aff-pay {
          padding: 14px 16px;
          gap: 12px;
          flex-wrap: wrap;
          align-items: flex-start;
          border-radius: 12px;
        }
        .aff-pay-icon {
          width: 36px;
          height: 36px;
        }
        .aff-pay-icon svg {
          width: 16px;
          height: 16px;
        }
        .aff-pay-text {
          flex: 1 1 auto;
          min-width: 0;
        }
        .aff-pay-eyebrow {
          font-size: 9px;
          letter-spacing: 0.16em;
        }
        .aff-pay-title {
          font-size: 13px;
          margin-top: 2px;
        }
        .aff-pay-sub {
          font-size: 11px;
          color: rgba(255, 255, 255, 0.6);
          margin-top: 4px;
          line-height: 1.5;
        }
        .aff-pay-amount {
          flex: 1 1 100%;
          text-align: left;
          padding-top: 10px;
          margin-top: 6px;
          border-top: 1px solid rgba(255, 255, 255, 0.1);
          display: flex;
          align-items: baseline;
          gap: 10px;
        }
        .aff-pay-amount-n {
          font-size: 22px;
          letter-spacing: -0.015em;
        }
        .aff-pay-amount-vat {
          margin-top: 0;
          font-size: 9.5px;
          letter-spacing: 0.1em;
          text-transform: uppercase;
        }

        .aff-pay-actions {
          flex-wrap: wrap;
          gap: 8px;
          justify-content: stretch;
          margin-top: 12px;
        }
        .aff-pay-actions .btn {
          flex: 1;
          justify-content: center;
          font-size: 13px;
          padding: 12px;
        }
        .aff-pay-actions .btn-outline {
          flex: 0 0 auto;
          min-width: 88px;
        }

        /* Post-payment "Affiliation submitted & paid" banner — tighten on mobile */
        .aff-submitted-banner {
          padding: 12px 14px;
          gap: 10px;
          border-radius: 12px;
        }
        .aff-submitted-icon {
          width: 36px;
          height: 36px;
        }
        .aff-submitted-icon svg {
          width: 18px;
          height: 18px;
        }
        .aff-submitted-title {
          font-size: 13.5px;
        }
        .aff-submitted-sub {
          font-size: 11px;
          line-height: 1.5;
          margin-top: 3px;
        }

        /* Affiliation form sidebar summary — already hidden but ensure spacing */
        .aff-summary-value {
          font-size: 12.5px;
        }
        .aff-summary-label {
          font-size: 10.5px;
        }

        /* Step strip in affiliation form — make pills tighter */
        .aff-step-strip > div,
        .aff-step-strip button {
          padding: 8px 10px !important;
          font-size: 11px !important;
        }

        /* Tables — make horizontally scrollable */
        .tbl-w {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
        .tbl {
          min-width: 540px;
        }
        .tbl td,
        .tbl thead th {
          padding: 9px 10px;
          font-size: 12px;
        }

        /* Pills & filters */
        .filter-row {
          gap: 6px;
        }
        .filter-pill {
          font-size: 11px;
          padding: 0 9px;
          height: 28px;
        }
        .search-box {
          max-width: none;
        }

        /* Doc rows: stack info + action */
        .doc-row {
          flex-wrap: wrap;
          gap: 10px;
          padding: 12px 14px;
        }
        .doc-row .doc-info {
          flex: 1 1 100%;
          order: 1;
        }
        .doc-row .doc-icon {
          order: 0;
        }
        .doc-row > .btn,
        .doc-row > .pill {
          order: 2;
        }
        .doc-row .doc-name {
          font-size: 13px;
        }

        /* Onboarding & exco modals — near full screen */
        .ob-backdrop {
          padding: 12px;
        }
        .ob-modal {
          width: 100%;
          max-width: 100%;
          max-height: 94vh;
          border-radius: 14px;
        }
        .ob-head {
          padding: 14px 18px;
        }
        .ob-body {
          padding: 22px 20px 18px;
          grid-template-columns: 1fr;
          gap: 16px;
        }
        .ob-body .ob-art {
          width: 80px;
          height: 80px;
          justify-self: flex-start;
        }
        .ob-body .ob-art svg {
          width: 44px;
          height: 44px;
        }
        .ob-title {
          font-size: 22px;
        }
        .ob-foot {
          padding: 12px 16px;
          gap: 8px;
          flex-wrap: wrap;
        }
        .ob-foot-hint {
          flex: 1 1 100%;
          text-align: center;
        }

        /* Profile picker */
        .ps-screen {
          padding: 32px 18px;
          gap: 28px;
        }
        .ps-brand-logo {
          height: 64px;
          padding: 10px 14px;
        }
        .ps-title {
          font-size: 26px;
        }
        .ps-desc {
          font-size: 13px;
        }
        .ps-card {
          padding: 20px 18px;
          gap: 14px;
        }
        .ps-card-title {
          font-size: 20px;
        }
        .ps-card-desc {
          font-size: 12.5px;
        }
        .ps-card-meta {
          gap: 12px;
        }
        .ps-card-stat-n {
          font-size: 17px;
        }
        .ps-footer {
          flex-wrap: wrap;
          justify-content: center;
          gap: 10px;
          text-align: center;
        }

        /* CQI questions */
        .cqi-q {
          grid-template-columns: 1fr;
          gap: 10px;
          padding: 12px 14px;
        }
        .cqi-section-w {
          font-size: 10px;
        }

        /* Total score block */
        .total-score-block {
          flex-direction: column;
          align-items: flex-start;
          padding: 18px 20px;
          gap: 16px;
        }
        .tsb-num {
          font-size: 48px;
        }

        /* Affiliation step strip — 2x2 instead of 1x4 to keep readable */
        .aff-main > div[style*='display:flex'][style*='gap:0'] {
          flex-wrap: wrap;
        }
        .aff-main > div[style*='display:flex'][style*='gap:0'] > button {
          flex: 1 1 50% !important;
          border-right: none !important;
          border-bottom: 1px solid var(--line) !important;
        }
        /* Hide the affiliation sidebar entirely on mobile — context is overkill on a phone */
        .aff-side {
          display: none;
        }
        .aff-layout {
          grid-template-columns: 1fr;
          gap: 0;
        }

        /* Toast bottom-right → centered bottom */
        .toast {
          left: 14px;
          right: 14px !important;
          bottom: 14px !important;
          text-align: center;
        }
      }

      /* Very narrow (≤ 380px): tighten further */
      @media (max-width: 380px) {
        .ph-title {
          font-size: 20px;
        }
        .h-user-name,
        .h-user-role {
          display: none;
        }
        .h-user {
          padding: 0;
          background: transparent;
          border: none;
        }
        .role-btn {
          padding: 3px 7px;
          font-size: 9px;
        }
      }

      /* ─── Player roster + clearance views ─── */
      .players-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-top: 0;
        animation: fadeUp 0.42s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .players-stat {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 14px 18px;
      }
      .players-stat-l {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted-2);
        margin-bottom: 6px;
      }
      .players-stat-n {
        font-family: 'Montserrat', sans-serif;
        font-size: 26px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.02em;
        line-height: 1;
      }
      @media (max-width: 840px) {
        .players-stats {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* Register-player form sections */
      .rp-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .rp-section {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 18px 20px;
        animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .rp-section-head {
        margin-bottom: 14px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .rp-section-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--green);
      }
      .rp-section-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
        display: flex;
        align-items: center;
      }
      .rp-check {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        color: var(--ink);
      }
      .rp-check input {
        width: 18px;
        height: 18px;
        accent-color: var(--green);
        cursor: pointer;
        flex-shrink: 0;
      }
      .rp-consent {
        background: var(--paper);
        border-style: dashed;
      }
      .rp-consent .rp-check {
        align-items: flex-start;
        font-size: 12px;
        line-height: 1.55;
        color: var(--muted);
      }
      .rp-consent .rp-check strong {
        color: var(--ink);
      }

      /* ID upload card */
      .rp-upload {
        border: 2px dashed var(--line);
        border-radius: 12px;
        background: var(--paper);
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .rp-upload:hover {
        border-color: var(--green);
        background: var(--green-pale);
      }
      .rp-upload.uploaded {
        border-style: solid;
        border-color: var(--green);
        background: var(--green-pale);
      }
      .rp-upload-inner {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 18px 20px;
        cursor: pointer;
      }
      .rp-upload-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--white);
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        flex-shrink: 0;
      }
      .rp-upload-icon.ok {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }
      .rp-upload-icon svg {
        width: 18px;
        height: 18px;
      }
      .rp-upload-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 700;
        color: var(--ink);
      }
      .rp-upload-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 3px;
      }

      .rp-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 6px;
        padding-top: 14px;
        border-top: 1px solid var(--line2);
      }
      .field-label .req {
        color: var(--coral);
        font-weight: 700;
        margin-left: 2px;
      }

      /* ─── Clearance cards (shared between club & admin views) ─── */
      .clr-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 6px;
      }
      .clr-card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 18px 22px;
        transition:
          transform 0.14s ease,
          box-shadow 0.14s ease,
          border-color 0.14s ease;
        animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .clr-card:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 22px rgba(10, 15, 20, 0.06);
      }
      .clr-card.overdue {
        border-color: var(--coral);
        background: #fff5f4;
      }
      .clr-card.resolved {
        background: var(--green-pale);
        border-color: rgba(15, 77, 46, 0.2);
      }
      .clr-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }
      .clr-eyebrow {
        font-family: 'Montserrat', sans-serif;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .clr-card.overdue .clr-eyebrow {
        color: var(--coral);
      }
      .clr-name {
        font-family: 'Montserrat', sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .clr-meta {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 3px;
        font-weight: 500;
      }
      .clr-route {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--paper);
        padding: 6px 12px;
        border-radius: 99px;
        border: 1px solid var(--line);
      }
      .clr-route-from,
      .clr-route-to {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--ink);
      }
      .clr-route-to {
        color: var(--green);
      }
      .clr-route svg {
        width: 12px;
        height: 12px;
        color: var(--muted);
      }

      .clr-note {
        margin-top: 10px;
        padding: 8px 12px;
        background: var(--paper);
        border-radius: 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        color: var(--muted);
        font-style: italic;
        border-left: 3px solid var(--green);
      }

      /* Two-button checklist */
      .clr-checklist {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }
      .clr-check {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 14px 16px;
        background: var(--white);
        border: 1.5px solid var(--line);
        border-radius: 10px;
        cursor: pointer;
        text-align: left;
        font-family: 'Montserrat', sans-serif;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .clr-check:hover {
        border-color: var(--ink3);
      }
      .clr-check.on {
        border-color: var(--green);
        background: var(--green-pale);
      }
      .clr-check-box {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        border: 2px solid var(--line);
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: #fff;
        margin-top: 2px;
      }
      .clr-check.on .clr-check-box {
        background: var(--green);
        border-color: var(--green);
      }
      .clr-check-box svg {
        width: 14px;
        height: 14px;
      }
      .clr-check-label {
        flex: 1;
        display: block;
        font-size: 13.5px;
        font-weight: 800;
        color: var(--ink);
      }
      .clr-check.on .clr-check-label {
        color: var(--green);
      }
      .clr-check-sub {
        display: block;
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
        margin-top: 3px;
      }

      .clr-ready {
        margin-top: 14px;
        padding: 14px 16px;
        background: var(--green-pale);
        border: 1px solid rgba(15, 77, 46, 0.2);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .clr-ready-msg {
        font-family: 'Montserrat', sans-serif;
        font-size: 12.5px;
        font-weight: 700;
        color: var(--green);
      }

      /* Admin override block */
      .clr-override {
        margin-top: 14px;
        padding: 16px 18px;
        background: var(--ink);
        color: #fff;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }
      .clr-override-text {
        flex: 1;
        min-width: 260px;
      }
      .clr-override-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 13.5px;
        font-weight: 800;
        color: #fff;
      }
      .clr-override-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        color: rgba(255, 255, 255, 0.65);
        margin-top: 4px;
        line-height: 1.5;
      }

      /* Read-only status strip on admin */
      .clr-status-strip {
        display: flex;
        gap: 14px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .clr-status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 99px;
        font-family: 'Montserrat', sans-serif;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--muted);
      }
      .clr-status.on {
        background: var(--green-pale);
        color: var(--green);
        border-color: rgba(15, 77, 46, 0.2);
      }
      .clr-status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted-3);
      }
      .clr-status.on .clr-status-dot {
        background: var(--green);
      }

      .clr-resolved-bar {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 12px;
        border-top: 1px solid var(--line2);
      }

      @media (max-width: 640px) {
        .clr-checklist {
          grid-template-columns: 1fr;
        }
        .clr-card {
          padding: 14px 16px;
        }
        .clr-name {
          font-size: 16px;
        }
      }

      /* ─── Facilities / VINIS satellite intelligence ─── */
      .fac-mode-switch {
        display: inline-flex;
        gap: 2px;
        padding: 3px;
        background: var(--paper);
        border-radius: 10px;
        border: 1px solid var(--line);
      }
      .fac-mode-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 12px;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-family: 'Montserrat', sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        border-radius: 8px;
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }
      .fac-mode-btn svg {
        width: 14px;
        height: 14px;
      }
      .fac-mode-btn:hover {
        color: var(--ink);
      }
      .fac-mode-btn.active {
        background: var(--ink);
        color: #fff;
      }

      /* Selection checkbox in table */
      .fac-check {
        display: inline-flex;
        align-items: center;
        cursor: pointer;
      }
      .fac-check input {
        width: 16px;
        height: 16px;
        accent-color: var(--green);
        cursor: pointer;
      }
      .row-selected {
        background: rgba(31, 170, 92, 0.06);
      }

      /* Compliance table cell — stacked number + pill */
      .fac-compliance-cell {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .fac-compliance-num {
        font-family: 'Montserrat', sans-serif;
        font-size: 16px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.02em;
      }

      /* VINIS field-health cell — score + sparkline */
      .fac-vinis-cell {
        display: flex;
        align-items: center;
        gap: 14px;
