    <circle cx="128" cy="100" r="3" fill="#13294B"/>
    <!-- Ear -->
    <path d="M82 64 L 88 50 L 100 64 Z" fill="#F2A900"/>
  </g>
  <!-- LIONS wordmark -->
  <text x="100" y="222" text-anchor="middle"
